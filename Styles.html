<style>
  :root{
    --brown:#77361A; --brown-dark:#5C2912; --gold:#C1A051; --gold-dark:#A8893E;
    --bg:#FBF8F4; --surface:#ffffff; --text:#2B2118; --muted:#8A7B6B;
    --line:#ece1cf; --line-soft:#f4ecdd;
    --todo:#9aa0a6; --prog:#2f6fb0; --review:#C1A051; --done:#3f8f4f;
    --danger:#b3261e; --shadow:0 1px 3px rgba(60,40,20,.08),0 6px 18px rgba(60,40,20,.06);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45}
  a{color:var(--brown)}
  h1,h2,h3,h4{margin:0;font-weight:700;color:var(--brown-dark)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none !important}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center}
  .row.wrap{flex-wrap:wrap}
  .grow{flex:1}
  .spacer{flex:1}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
    background:var(--brown);color:#fff;padding:10px 18px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.5px;font-size:18px}
  .brand .dot{color:var(--gold)}
  .brand small{display:block;font-size:11px;font-weight:500;color:#f1e6d4;letter-spacing:.3px}
  .topbar .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);
    padding:5px 10px;border-radius:999px;font-size:13px}
  .avatar{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#3a2a10;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
  .bell{position:relative;background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;
    border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
  .bell .count{position:absolute;top:-4px;right:-4px;background:var(--gold);color:#3a2a10;border-radius:999px;
    min-width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

  /* Layout */
  .layout{display:flex;min-height:calc(100vh - 56px)}
  .sidebar{width:210px;background:var(--surface);border-right:1px solid var(--line);padding:14px 10px;flex-shrink:0}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text);
    text-decoration:none;font-weight:600;margin-bottom:4px}
  .nav a .ic{width:18px;text-align:center}
  .nav a:hover{background:var(--line-soft)}
  .nav a.active{background:var(--brown);color:#fff}
  .main{flex:1;padding:20px 24px;min-width:0}
  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .page-head h1{font-size:22px}

  /* Cards & stats */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .stat{padding:14px 16px}
  .stat .n{font-size:26px;font-weight:800;color:var(--brown)}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat.alert .n{color:var(--danger)}

  /* Progress */
  .prog{height:8px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--brown))}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
  .badge.stage-todo{background:#eef0f2;color:#5a6068}
  .badge.stage-inprogress{background:#e7f0fa;color:#235c97}
  .badge.stage-review{background:#f7efd6;color:#876a14}
  .badge.stage-completed{background:#e6f3e9;color:#2f7a40}
  .badge.pri-High{background:#fdeceb;color:#b3261e}
  .badge.pri-Medium{background:#fff3e0;color:#a6611a}
  .badge.pri-Low{background:#eef2ee;color:#5a6b5c}
  .badge.role{background:var(--gold);color:#3a2a10}
  .badge.status{background:#efe7d8;color:#6b5836}
  .badge.over{background:#fdeceb;color:#b3261e}

  /* Buttons */
  .btn{border:1px solid var(--brown);background:var(--brown);color:#fff;padding:8px 14px;border-radius:9px;font-weight:700;font-size:13px}
  .btn:hover{background:var(--brown-dark)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#3a2a10}
  .btn.gold:hover{background:var(--gold-dark)}
  .btn.ghost{background:transparent;color:var(--brown);border-color:var(--line)}
  .btn.ghost:hover{background:var(--line-soft)}
  .btn.danger{background:#fff;border-color:#e7b7b3;color:var(--danger)}
  .btn.danger:hover{background:#fdeceb}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* Forms */
  label.fld{display:block;margin:10px 0}
  label.fld>span{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff;color:var(--text)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,160,81,.18)}
  textarea{resize:vertical;min-height:64px}
  .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}

  /* Project list */
  .proj{display:flex;flex-direction:column;gap:8px;padding:16px}
  .proj h3{font-size:16px}
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

  /* Board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .col{background:#f7f1e7;border:1px solid var(--line);border-radius:var(--radius);padding:10px;min-height:120px}
  .col h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
  .tcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer}
  .tcard:hover{border-color:var(--gold)}
  .tcard .t{font-weight:700;font-size:13.5px;margin-bottom:6px}
  .tcard .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tcard.sub{border-left:3px solid var(--gold)}

  /* Table */
  table.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden}
  table.tbl th{background:var(--line-soft);text-align:left;padding:9px 12px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  table.tbl td{padding:10px 12px;border-top:1px solid var(--line);vertical-align:middle}
  table.tbl tr:hover td{background:#fcf8f1}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(40,25,12,.45);display:flex;align-items:flex-start;justify-content:center;
    padding:30px 16px;z-index:50;overflow:auto}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(40,25,12,.35);overflow:hidden}
  .modal .head{display:flex;align-items:flex-start;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line);background:#fff}
  .modal .body{padding:18px 20px;max-height:70vh;overflow:auto}
  .modal .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
  .section{margin-top:18px;padding-top:14px;border-top:1px dashed var(--line)}
  .section h4{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:8px}

  /* Checklist & comments */
  .chk{display:flex;align-items:center;gap:8px;padding:5px 0}
  .chk input{width:auto}
  .chk.done span{text-decoration:line-through;color:var(--muted)}
  .cmt{padding:9px 0;border-bottom:1px solid var(--line-soft)}
  .cmt .who{font-weight:700;font-size:12.5px}
  .cmt .when{color:var(--muted);font-size:11px}
  .cmt .bd{margin-top:3px;white-space:pre-wrap}
  .mention{color:var(--brown);font-weight:700;background:#f6eede;border-radius:4px;padding:0 3px}

  /* Notifications */
  .notif-pop{position:absolute;top:50px;right:14px;width:340px;max-height:70vh;overflow:auto;z-index:40}
  .notif{padding:10px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .notif:hover{background:#fcf8f1}
  .notif.unread{background:#fbf3e2}
  .notif .nt{font-weight:700;font-size:13px}
  .notif .nb{font-size:12.5px;color:var(--muted)}

  /* Toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown-dark);color:#fff;
    padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);z-index:80;font-size:13.5px;max-width:90%}
  .toast.err{background:var(--danger)}

  /* Access screen */
  .access{max-width:480px;margin:8vh auto;text-align:center;padding:32px}
  .access .logo{font-size:30px;font-weight:800;color:var(--brown);margin-bottom:6px}
  .access .logo .dot{color:var(--gold)}

  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;
    animation:spin .8s linear infinite;margin:40px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Switch account link in topbar */
  .switch-link{margin-left:6px;color:#fff;font-size:12px;text-decoration:underline;opacity:.9;white-space:nowrap;flex-shrink:0}

  /* Temporary UI build marker — confirms the live deployment matches latest code */
  .ver-tag{background:var(--gold);color:#3a2a10;font-size:10px;font-weight:800;
    padding:1px 6px;border-radius:999px;margin-left:8px;letter-spacing:.3px;flex-shrink:0}

  /* ── Tablet (≤860px) — horizontal sidebar nav ── */
  @media(max-width:860px){
    .layout{flex-direction:column}
    .sidebar{width:auto;border-right:none;border-bottom:1px solid var(--line);padding:6px 12px;display:block;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
    .nav{display:flex;gap:4px;width:max-content}
    .nav a{margin-bottom:0;white-space:nowrap;padding:8px 14px}
    .board{grid-template-columns:repeat(2,1fr)}
    .main{padding:16px}
    .stat-grid{grid-template-columns:repeat(3,1fr)}
  }

  /* ════════════════════════════════════════════════════════════════════
     ADI MOBILE UI  —  implementation of the approved "ADI Mobile UI Design"
     package. Activates under the html.mob class (set by JS for phones / <768px).
     Desktop CSS above is untouched. Palette + sizing per the design brief.
     ════════════════════════════════════════════════════════════════════ */
  :root{ --m-pri:#77361A; --m-pri-d:#5C2912; --m-gold:#C1A051; --m-gold-d:#A8893E; }

  /* Hide the whole mobile chrome on desktop; JS toggles via html.mob */
  .m-appbar,.bottom-nav,.fab{display:none}

  /* ---- App bar (brown gradient header) ----
     Top-level screens: tall header with a large title at the bottom-left + actions
     at the right (design 02/04/05/10). Sub-pages add .center → compact, back +
     centered title (design 06/07/09/11/12). */
  .m-appbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--m-pri),var(--m-pri-d));
    color:#fff;padding:0 16px 16px;min-height:92px;align-items:flex-end;gap:10px}
  .m-appbar .m-back{width:40px;height:40px;border:none;background:none;color:#fff;font-size:28px;
    display:flex;align-items:center;justify-content:center;margin-left:-8px;-webkit-tap-highlight-color:transparent;flex-shrink:0}
  .m-appbar .m-title{font-size:28px;font-weight:800;letter-spacing:.2px;flex:1;min-width:0;line-height:1.1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .m-appbar.center{align-items:center;min-height:60px;padding:0 10px}
  .m-appbar.center .m-title{text-align:center;font-size:20px}
  .m-appbar .m-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-bottom:3px}
  .m-appbar .m-bell{position:relative;width:44px;height:44px;border:none;background:none;color:#fff;
    display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
  .m-appbar .m-bell svg{width:24px;height:24px}
  .m-appbar .m-bell .count{position:absolute;top:4px;right:4px;min-width:18px;height:18px;padding:0 4px;
    background:var(--m-gold);color:#3a2a10;border-radius:999px;font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;line-height:1}
  .m-appbar .m-avatar{width:40px;height:40px;border-radius:50%;background:var(--m-gold);color:#3a2a10;
    font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;border:none;-webkit-tap-highlight-color:transparent}
  .m-appbar.ver::after{content:attr(data-ver);position:absolute;top:8px;left:50%;transform:translateX(-50%);
    background:var(--m-gold);color:#3a2a10;font-size:10px;font-weight:800;padding:1px 6px;border-radius:999px}

  /* ---- Bottom navigation (Home · Projects · My Tasks · More) ---- */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);
    border-top:1px solid var(--line);z-index:35;box-shadow:0 -2px 16px rgba(60,40,20,.09);
    padding-bottom:env(safe-area-inset-bottom,0)}
  .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--muted);text-decoration:none;font-size:12px;font-weight:600;-webkit-tap-highlight-color:transparent}
  .bottom-nav a .ic{display:flex;align-items:center;justify-content:center}
  .bottom-nav a .ic svg{width:25px;height:25px}
  .bottom-nav a.active{color:var(--m-pri)}
  .bottom-nav a.active .ic{position:relative}
  .bottom-nav a.active .ic::before{content:'';position:absolute;inset:-7px -12px;background:#f3e7cf;border-radius:999px;z-index:-1}

  /* ---- Floating action button (gold, New task) ---- */
  .fab{position:fixed;bottom:80px;right:18px;width:56px;height:56px;border-radius:50%;
    background:var(--m-gold);color:#3a2a10;border:none;font-size:30px;line-height:1;
    box-shadow:0 6px 18px rgba(120,80,20,.42);z-index:34;cursor:pointer;
    align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform .12s}
  .fab:active{transform:scale(.92)}

  /* ════════ html.mob: layout + components ════════ */
  html.mob body{font-size:14px}
  html.mob .topbar{display:none}      /* desktop top bar replaced by .m-appbar */
  html.mob .sidebar{display:none !important}
  html.mob .layout{display:block;min-height:0}
  html.mob .main{padding:16px 16px 92px;max-width:100%}
  html.mob .m-appbar{display:flex}
  html.mob .bottom-nav{display:flex}
  html.mob .fab{display:flex}
  html.mob .page-head{display:none}   /* title now lives in the app bar */

  /* Pills — reuse .badge colours; make them comfortable on mobile */
  html.mob .badge{font-size:12px;padding:4px 11px;border-radius:999px;font-weight:700}

  /* Generic mobile card */
  .m-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px;box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent}
  .m-card.tap{cursor:pointer}
  .m-card.tap:active{background:#fdf7ef}
  .m-section-h{display:flex;align-items:center;justify-content:between;margin:18px 2px 10px}
  .m-section-h .t{font-size:15px;font-weight:800;color:var(--text);flex:1}
  .m-section-h .a{font-size:14px;font-weight:700;color:var(--m-pri)}
  .m-list{display:flex;flex-direction:column;gap:12px}
  .m-muted{color:var(--muted)}
  .m-empty{color:var(--muted);text-align:center;padding:26px 10px;font-size:14px}

  /* ---- Stat tiles (2-col grid of 6 KPIs) ---- */
  .m-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
  .m-stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;min-height:104px;
    display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .m-stat:active{background:#fdf7ef}
  .m-stat .n{font-size:34px;font-weight:800;color:var(--m-pri);line-height:1}
  .m-stat.alert .n{color:var(--danger)}
  .m-stat .l{font-size:14px;color:var(--muted);margin-top:6px}

  /* ---- Workflow distribution ---- */
  .m-workflow .bar{display:flex;height:14px;border-radius:999px;overflow:hidden;margin:4px 0 10px}
  .m-workflow .bar i{display:block;height:100%}
  .m-workflow .legend{font-size:13px;color:var(--muted)}

  /* ---- Mini-tab chips (Needs attention, etc.) ---- */
  .m-chips{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 12px}
  .m-chip{padding:8px 14px;border-radius:999px;background:var(--line-soft);color:var(--text);
    font-size:13px;font-weight:700;border:none;-webkit-tap-highlight-color:transparent;cursor:pointer}
  .m-chip.active{background:var(--m-pri);color:#fff}

  /* ---- Task card (the repeating list unit) ---- */
  .m-task{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;
    box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative}
  .m-task:active{background:#fdf7ef}
  .m-task.sub{border-left:4px solid var(--m-gold)}
  .m-task .t{font-size:16px;font-weight:800;color:var(--text);line-height:1.35;padding-right:28px}
  .m-task .meta{display:flex;justify-content:space-between;gap:10px;margin-top:4px}
  .m-task .proj{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .m-task .who{font-size:13px;color:var(--muted);white-space:nowrap;flex-shrink:0;max-width:42%;overflow:hidden;text-overflow:ellipsis}
  .m-task .pills{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px}
  .m-task .due{font-size:13px;font-weight:700;color:var(--muted)}
  .m-task .due.over{color:var(--danger)}
  .m-task .more{position:absolute;top:10px;right:8px;width:30px;height:34px;border:none;background:none;
    color:var(--muted);font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent}
  .m-task .spacer{flex:1}
  /* status control (My Tasks) */
  .m-statusctl{border:1.5px solid var(--m-gold);background:#fff;color:var(--m-pri-d);font-weight:800;
    font-size:14px;border-radius:999px;padding:9px 16px;min-height:40px;-webkit-tap-highlight-color:transparent;flex-shrink:0}

  /* ---- Segmented control (My Tasks buckets) ---- */
  .m-seg{display:flex;background:#efe7d9;border-radius:12px;padding:4px;margin-bottom:14px}
  .m-seg button{flex:1;border:none;background:none;padding:10px 6px;border-radius:9px;font-size:14px;
    font-weight:700;color:var(--muted);-webkit-tap-highlight-color:transparent}
  .m-seg button.active{background:#fff;color:var(--m-pri);box-shadow:var(--shadow)}

  /* ---- Stage tabs (project board) ---- */
  .m-stagetabs{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:14px}
  .m-stagetab{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:999px;
    border:1px solid var(--line);background:#fff;font-size:14px;font-weight:700;color:var(--text);-webkit-tap-highlight-color:transparent}
  .m-stagetab.active{background:var(--m-pri);color:#fff;border-color:var(--m-pri)}
  .m-stagetab .ct{font-size:12px;font-weight:800;background:rgba(0,0,0,.08);border-radius:999px;padding:1px 8px}
  .m-stagetab.active .ct{background:var(--m-gold);color:#3a2a10}

  /* ---- Project card ---- */
  .m-proj .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .m-proj h3{font-size:18px;font-weight:800;flex:1}
  .m-proj .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .m-proj .bar{height:10px;background:var(--line-soft);border-radius:999px;overflow:hidden;margin:12px 0 6px}
  .m-proj .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--m-gold),var(--m-pri))}
  .m-proj .pct{font-size:14px;color:var(--muted)}
  .m-proj .acts{display:flex;gap:10px;margin-top:14px}
  .m-proj .acts .btn{flex:1}

  /* ---- Full-screen task detail ---- */
  html.mob.detail-open .bottom-nav,html.mob.detail-open .fab{display:none}
  .m-detail{padding-bottom:84px}
  .m-detail .dhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .m-detail .dproj{margin-left:auto;font-size:13px;color:var(--muted)}
