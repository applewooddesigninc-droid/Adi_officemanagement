<style>
  :root{
    --brown:#77361A; --brown-dark:#5C2912; --gold:#C1A051; --gold-dark:#A8893E;
    --bg:#FBF8F4; --surface:#ffffff; --text:#2B2118; --muted:#8A7B6B;
    --line:#ece1cf; --line-soft:#f4ecdd;
    --todo:#9aa0a6; --prog:#2f6fb0; --review:#C1A051; --done:#3f8f4f;
    --danger:#b3261e; --shadow:0 1px 3px rgba(60,40,20,.08),0 6px 18px rgba(60,40,20,.06);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45}
  a{color:var(--brown)}
  h1,h2,h3,h4{margin:0;font-weight:700;color:var(--brown-dark)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none !important}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center}
  .row.wrap{flex-wrap:wrap}
  .grow{flex:1}
  .spacer{flex:1}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
    background:var(--brown);color:#fff;padding:10px 18px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.5px;font-size:18px}
  .brand .dot{color:var(--gold)}
  .brand small{display:block;font-size:11px;font-weight:500;color:#f1e6d4;letter-spacing:.3px}
  .topbar .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);
    padding:5px 10px;border-radius:999px;font-size:13px}
  .avatar{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#3a2a10;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
  .bell{position:relative;background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;
    border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
  .bell .count{position:absolute;top:-4px;right:-4px;background:var(--gold);color:#3a2a10;border-radius:999px;
    min-width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

  /* Layout */
  .layout{display:flex;min-height:calc(100vh - 56px)}
  .sidebar{width:210px;background:var(--surface);border-right:1px solid var(--line);padding:14px 10px;flex-shrink:0}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text);
    text-decoration:none;font-weight:600;margin-bottom:4px}
  .nav a .ic{width:18px;text-align:center}
  .nav a:hover{background:var(--line-soft)}
  .nav a.active{background:var(--brown);color:#fff}
  .main{flex:1;padding:20px 24px;min-width:0}
  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .page-head h1{font-size:22px}

  /* Cards & stats */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .stat{padding:14px 16px}
  .stat .n{font-size:26px;font-weight:800;color:var(--brown)}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat.alert .n{color:var(--danger)}

  /* Progress */
  .prog{height:8px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--brown))}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
  .badge.stage-todo{background:#eef0f2;color:#5a6068}
  .badge.stage-inprogress{background:#e7f0fa;color:#235c97}
  .badge.stage-review{background:#f7efd6;color:#876a14}
  .badge.stage-completed{background:#e6f3e9;color:#2f7a40}
  .badge.pri-High{background:#fdeceb;color:#b3261e}
  .badge.pri-Medium{background:#fff3e0;color:#a6611a}
  .badge.pri-Low{background:#eef2ee;color:#5a6b5c}
  .badge.role{background:var(--gold);color:#3a2a10}
  .badge.status{background:#efe7d8;color:#6b5836}
  .badge.over{background:#fdeceb;color:#b3261e}

  /* Buttons */
  .btn{border:1px solid var(--brown);background:var(--brown);color:#fff;padding:8px 14px;border-radius:9px;font-weight:700;font-size:13px}
  .btn:hover{background:var(--brown-dark)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#3a2a10}
  .btn.gold:hover{background:var(--gold-dark)}
  .btn.ghost{background:transparent;color:var(--brown);border-color:var(--line)}
  .btn.ghost:hover{background:var(--line-soft)}
  .btn.danger{background:#fff;border-color:#e7b7b3;color:var(--danger)}
  .btn.danger:hover{background:#fdeceb}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* Forms */
  label.fld{display:block;margin:10px 0}
  label.fld>span{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff;color:var(--text)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,160,81,.18)}
  textarea{resize:vertical;min-height:64px}
  .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}

  /* Project list */
  .proj{display:flex;flex-direction:column;gap:8px;padding:16px}
  .proj h3{font-size:16px}
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

  /* Board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .col{background:#f7f1e7;border:1px solid var(--line);border-radius:var(--radius);padding:10px;min-height:120px}
  .col h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
  .tcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer}
  .tcard:hover{border-color:var(--gold)}
  .tcard .t{font-weight:700;font-size:13.5px;margin-bottom:6px}
  .tcard .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tcard.sub{border-left:3px solid var(--gold)}

  /* Table */
  table.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden}
  table.tbl th{background:var(--line-soft);text-align:left;padding:9px 12px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  table.tbl td{padding:10px 12px;border-top:1px solid var(--line);vertical-align:middle}
  table.tbl tr:hover td{background:#fcf8f1}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(40,25,12,.45);display:flex;align-items:flex-start;justify-content:center;
    padding:30px 16px;z-index:50;overflow:auto}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(40,25,12,.35);overflow:hidden}
  .modal .head{display:flex;align-items:flex-start;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line);background:#fff}
  .modal .body{padding:18px 20px;max-height:70vh;overflow:auto}
  .modal .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
  .section{margin-top:18px;padding-top:14px;border-top:1px dashed var(--line)}
  .section h4{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:8px}

  /* Checklist & comments */
  .chk{display:flex;align-items:center;gap:8px;padding:5px 0}
  .chk input{width:auto}
  .chk.done span{text-decoration:line-through;color:var(--muted)}
  .cmt{padding:9px 0;border-bottom:1px solid var(--line-soft)}
  .cmt .who{font-weight:700;font-size:12.5px}
  .cmt .when{color:var(--muted);font-size:11px}
  .cmt .bd{margin-top:3px;white-space:pre-wrap}
  .mention{color:var(--brown);font-weight:700;background:#f6eede;border-radius:4px;padding:0 3px}

  /* Notifications */
  .notif-pop{position:absolute;top:50px;right:14px;width:340px;max-height:70vh;overflow:auto;z-index:40}
  .notif{padding:10px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .notif:hover{background:#fcf8f1}
  .notif.unread{background:#fbf3e2}
  .notif .nt{font-weight:700;font-size:13px}
  .notif .nb{font-size:12.5px;color:var(--muted)}

  /* Toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown-dark);color:#fff;
    padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);z-index:80;font-size:13.5px;max-width:90%}
  .toast.err{background:var(--danger)}

  /* Access screen */
  .access{max-width:480px;margin:8vh auto;text-align:center;padding:32px}
  .access .logo{font-size:30px;font-weight:800;color:var(--brown);margin-bottom:6px}
  .access .logo .dot{color:var(--gold)}

  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;
    animation:spin .8s linear infinite;margin:40px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Switch account link in topbar */
  .switch-link{margin-left:6px;color:#fff;font-size:12px;text-decoration:underline;opacity:.9;white-space:nowrap;flex-shrink:0}

  /* Temporary UI build marker — confirms the live deployment matches latest code */
  .ver-tag{background:var(--gold);color:#3a2a10;font-size:10px;font-weight:800;
    padding:1px 6px;border-radius:999px;margin-left:8px;letter-spacing:.3px;flex-shrink:0}

  /* ── Tablet (≤860px) — horizontal sidebar nav ── */
  @media(max-width:860px){
    .layout{flex-direction:column}
    .sidebar{width:auto;border-right:none;border-bottom:1px solid var(--line);padding:6px 12px;display:block;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
    .nav{display:flex;gap:4px;width:max-content}
    .nav a{margin-bottom:0;white-space:nowrap;padding:8px 14px}
    .board{grid-template-columns:repeat(2,1fr)}
    .main{padding:16px}
    .stat-grid{grid-template-columns:repeat(3,1fr)}
  }

  /* ══ Bottom navigation bar ══ */
  .bottom-nav{
    display:none;position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--line);
    z-index:35;box-shadow:0 -2px 16px rgba(60,40,20,.09);
    padding-bottom:env(safe-area-inset-bottom,0)
  }
  .bottom-nav a{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:9px 4px 7px;color:var(--muted);text-decoration:none;
    font-size:10px;font-weight:600;gap:3px;letter-spacing:.2px;
    -webkit-tap-highlight-color:transparent;transition:color .12s
  }
  .bottom-nav a .ic{font-size:22px;line-height:1;transition:transform .12s}
  .bottom-nav a.active{color:var(--brown)}
  .bottom-nav a.active .ic{transform:scale(1.1)}

  /* ══ Floating action button ══ */
  .fab{
    display:none;position:fixed;bottom:78px;right:18px;
    width:54px;height:54px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);
    color:#3a2a10;border:none;font-size:28px;font-weight:300;
    box-shadow:0 4px 20px rgba(120,80,20,.4);
    z-index:36;cursor:pointer;line-height:1;
    align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s
  }
  .fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(120,80,20,.22)}

  /* ══ Mobile task cards (touch-first) ══ */
  .m-task-list{display:flex;flex-direction:column;gap:12px}
  .m-task-card{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px;box-shadow:var(--shadow);cursor:pointer;
    -webkit-tap-highlight-color:transparent;transition:background .12s
  }
  .m-task-card:active{background:#fdf7ef}
  .m-task-card.sub{border-left:4px solid var(--gold);border-radius:5px 14px 14px 5px}
  .m-task-title{font-weight:700;font-size:16px;margin-bottom:10px;line-height:1.4;color:var(--text)}
  .m-task-indent{color:var(--muted);margin-right:5px}
  .m-task-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;align-items:center}
  .m-task-proj{font-size:12.5px;color:var(--muted);background:var(--line-soft);
    padding:3px 10px;border-radius:999px;white-space:nowrap;max-width:60vw;overflow:hidden;text-overflow:ellipsis}
  .m-task-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px}
  .m-assignee{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;min-width:0}
  .m-avatar{width:28px;height:28px;border-radius:50%;background:var(--gold);color:#3a2a10;
    font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .m-assignee-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42vw}
  .m-sub-prog{display:flex;align-items:center;gap:7px;margin-top:7px}

  /* ══ Mobile team-member cards (roster table → cards) ══ */
  .m-user-list{display:flex;flex-direction:column;gap:12px}
  .m-user-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px;box-shadow:var(--shadow)}
  .m-user-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .m-user-name{font-weight:700;font-size:16px}
  .m-user-email{font-size:13.5px;color:var(--muted);margin:2px 0 8px;word-break:break-all}

  /* ══ Task-card action buttons (bottom of each task card) ══ */
  .m-task-actions{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft)}
  .m-act{flex:1;min-height:46px;border-radius:11px;font-size:15px;font-weight:700;
    border:1px solid var(--line);background:#fff;color:var(--brown);
    display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
  .m-act.primary{background:var(--gold);border-color:var(--gold);color:#3a2a10}
  .m-act:active{opacity:.85}

  /* ════════════════════════════════════════════════════════════════════
     MOBILE REDESIGN — touch-first. Driven by html.mob (set by JS on phones
     and narrow viewports), so it applies reliably inside the GAS iframe where
     width-based media queries are unreliable. The desktop CSS above is left
     completely untouched. Material-inspired: 16px base text, ~48px touch
     targets, 16px gutters, generous spacing.
     ════════════════════════════════════════════════════════════════════ */
  html.mob body{font-size:16px;line-height:1.5}

  /* ---- Shell: top bar ---- */
  html.mob .topbar{height:56px;padding:0 16px;gap:12px}
  html.mob .brand{font-size:18px}
  html.mob .brand small{display:none}
  html.mob .ver-tag{font-size:11px;padding:2px 7px}
  html.mob .userchip{padding:0;background:none}
  html.mob .userchip .name-role{display:none}
  html.mob .switch-link{display:none}
  html.mob .bell{width:42px;height:42px;font-size:20px}
  html.mob .topbar .btn{display:none}                /* the FAB replaces "+ New task" */

  /* ---- Shell: body, bottom nav, FAB ---- */
  html.mob .sidebar{display:none !important}
  html.mob .layout{display:block;min-height:calc(100vh - 56px)}
  html.mob .main{padding:16px 16px 96px}             /* bottom pad clears the nav + FAB */
  html.mob .bottom-nav{display:flex;height:62px}
  html.mob .bottom-nav a{font-size:12px;gap:4px;padding:7px 4px;font-weight:600}
  html.mob .bottom-nav a .ic{font-size:24px;display:flex;align-items:center;justify-content:center}
  html.mob .bottom-nav a .ic svg{width:25px;height:25px}
  html.mob .fab{display:flex;width:50px;height:50px;font-size:27px;bottom:72px;right:14px}

  /* ---- Typography ---- */
  html.mob h1{font-size:22px}
  html.mob h2{font-size:20px}
  html.mob .small{font-size:13px}
  html.mob .page-head{margin-bottom:16px;gap:10px;flex-wrap:wrap}
  html.mob .page-head h1{font-size:22px}
  html.mob .page-head > .btn{display:inline-flex !important}

  /* ---- Buttons: ≥48px targets, more space between ---- */
  html.mob .row{gap:12px}
  html.mob .btn{min-height:48px;padding:12px 18px;font-size:16px;border-radius:11px;
    display:inline-flex;align-items:center;justify-content:center}
  html.mob .btn.sm{min-height:40px;padding:9px 14px;font-size:14px}

  /* ---- Forms: 16px (prevents iOS focus-zoom), 48px tall, full width ---- */
  html.mob input,html.mob select,html.mob textarea{font-size:16px;min-height:48px;
    padding:12px 14px;border-radius:11px;scroll-margin-bottom:140px}
  html.mob textarea{min-height:104px}
  html.mob label.fld{margin:14px 0}
  html.mob label.fld>span{font-size:13px;margin-bottom:6px}
  html.mob .filters{grid-template-columns:1fr;gap:10px;margin-bottom:14px}

  /* ---- Stat cards: square-ish 2×2 tiles with large numbers ---- */
  html.mob .stat-grid{grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  html.mob .stat{aspect-ratio:1.3/1;display:flex;flex-direction:column;justify-content:center;padding:16px 18px;border-radius:16px}
  html.mob .stat .n{font-size:30px;font-weight:800;line-height:1}
  html.mob .stat .l{font-size:13px;margin-top:6px;text-transform:none;letter-spacing:.2px}

  /* ---- Stacked cards / widgets / board / projects ---- */
  html.mob .card{border-radius:14px}
  html.mob .widget-grid{grid-template-columns:1fr !important;gap:12px}
  html.mob .widget{padding:16px}
  html.mob .widget-title{font-size:12px}
  html.mob .widget-list li{padding:9px 0;font-size:14px}
  html.mob .wm{font-size:12.5px}
  html.mob .w-empty,html.mob .emp-row{font-size:13.5px}
  html.mob .board{grid-template-columns:1fr;gap:12px}
  html.mob .proj-grid{grid-template-columns:1fr;gap:12px}
  html.mob .proj{padding:16px}
  html.mob .proj h3{font-size:17px}

  /* ---- Collapsible dashboard sections (Filter tasks / Insights) ---- */
  html.mob details.m-collapse{margin-bottom:12px}
  html.mob details.m-collapse>summary{padding:14px 16px;font-size:15px;font-weight:700;
    color:var(--brown-dark);background:var(--surface);border:1px solid var(--line);border-radius:13px;
    cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;
    -webkit-tap-highlight-color:transparent}
  html.mob details.m-collapse>summary::-webkit-details-marker{display:none}
  html.mob details.m-collapse>summary::after{content:'▾';font-size:14px;color:var(--muted)}
  html.mob details.m-collapse[open]>summary{margin-bottom:12px}
  html.mob details.m-collapse[open]>summary::after{content:'▴'}

  /* ---- Badges a touch larger for legibility ---- */
  html.mob .badge{font-size:12.5px;padding:3px 10px}

  /* ---- History timeline ---- */
  html.mob .hist-text,html.mob .hist-who{font-size:13px}
  html.mob .hist-when{font-size:12px}

  /* ---- Modal: full-height bottom sheet with grab handle ---- */
  html.mob .overlay{padding:0;align-items:flex-end;background:rgba(40,25,12,.55)}
  html.mob .modal{border-radius:22px 22px 0 0;max-width:100%;width:100%;max-height:94vh;margin:0}
  html.mob .modal .head{padding:0 18px 14px;position:relative}
  html.mob .modal .head::before{content:'';display:block;width:40px;height:4px;
    background:var(--line);border-radius:2px;margin:12px auto 12px}
  html.mob .modal .head h2{font-size:19px;line-height:1.3}
  html.mob .modal .x{width:44px;height:44px;font-size:26px;display:flex;
    align-items:center;justify-content:center;flex-shrink:0}
  html.mob .modal .body{max-height:calc(94vh - 84px);padding:8px 16px 28px}
  html.mob .section{margin-top:20px;padding-top:16px}
  /* Primary stage actions (the first action row in the sheet) → full-width buttons */
  html.mob .modal .body > .row.wrap:first-child .btn{flex:1 1 100%;min-height:50px}

  /* ---- Checklist & comments: bigger checkboxes + text ---- */
  html.mob .chk{padding:10px 0;gap:12px}
  html.mob .chk input[type=checkbox]{width:24px;height:24px;flex-shrink:0}
  html.mob .chk .grow{font-size:15px}
  html.mob .cmt{padding:12px 0}
  html.mob .cmt .who{font-size:14px}
  html.mob .cmt .when{font-size:12px}
  html.mob .cmt .bd{font-size:15px;margin-top:5px}

  /* ---- Notifications: full-width sheet, large rows ---- */
  html.mob .notif-pop{position:fixed;width:auto;right:8px;left:8px;top:60px;max-height:78vh;border-radius:14px}
  html.mob .notif{padding:14px 16px}
  html.mob .notif .nt{font-size:15px}
