<style>
  :root{
    --brown:#77361A; --brown-dark:#5C2912; --gold:#C1A051; --gold-dark:#A8893E;
    --bg:#FBF8F4; --surface:#ffffff; --text:#2B2118; --muted:#8A7B6B;
    --line:#ece1cf; --line-soft:#f4ecdd;
    --todo:#9aa0a6; --prog:#2f6fb0; --review:#C1A051; --done:#3f8f4f;
    --danger:#b3261e; --shadow:0 1px 3px rgba(60,40,20,.08),0 6px 18px rgba(60,40,20,.06);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45}
  a{color:var(--brown)}
  h1,h2,h3,h4{margin:0;font-weight:700;color:var(--brown-dark)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none !important}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center}
  .row.wrap{flex-wrap:wrap}
  .grow{flex:1}
  .spacer{flex:1}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
    background:var(--brown);color:#fff;padding:10px 18px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.5px;font-size:18px}
  .brand .dot{color:var(--gold)}
  .brand small{display:block;font-size:11px;font-weight:500;color:#f1e6d4;letter-spacing:.3px}
  .topbar .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);
    padding:5px 10px;border-radius:999px;font-size:13px}
  .avatar{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#3a2a10;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
  .bell{position:relative;background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;
    border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
  .bell .count{position:absolute;top:-4px;right:-4px;background:var(--gold);color:#3a2a10;border-radius:999px;
    min-width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

  /* Layout */
  .layout{display:flex;min-height:calc(100vh - 56px)}
  .sidebar{width:210px;background:var(--surface);border-right:1px solid var(--line);padding:14px 10px;flex-shrink:0}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text);
    text-decoration:none;font-weight:600;margin-bottom:4px}
  .nav a .ic{width:18px;text-align:center}
  .nav a:hover{background:var(--line-soft)}
  .nav a.active{background:var(--brown);color:#fff}
  .main{flex:1;padding:20px 24px;min-width:0}
  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .page-head h1{font-size:22px}

  /* Cards & stats */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .stat{padding:14px 16px}
  .stat .n{font-size:26px;font-weight:800;color:var(--brown)}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat.alert .n{color:var(--danger)}

  /* Progress */
  .prog{height:8px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--brown))}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
  .badge.stage-todo{background:#eef0f2;color:#5a6068}
  .badge.stage-inprogress{background:#e7f0fa;color:#235c97}
  .badge.stage-review{background:#f7efd6;color:#876a14}
  .badge.stage-completed{background:#e6f3e9;color:#2f7a40}
  .badge.pri-High{background:#fdeceb;color:#b3261e}
  .badge.pri-Medium{background:#fff3e0;color:#a6611a}
  .badge.pri-Low{background:#eef2ee;color:#5a6b5c}
  .badge.role{background:var(--gold);color:#3a2a10}
  .badge.status{background:#efe7d8;color:#6b5836}
  .badge.over{background:#fdeceb;color:#b3261e}

  /* Buttons */
  .btn{border:1px solid var(--brown);background:var(--brown);color:#fff;padding:8px 14px;border-radius:9px;font-weight:700;font-size:13px}
  .btn:hover{background:var(--brown-dark)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#3a2a10}
  .btn.gold:hover{background:var(--gold-dark)}
  .btn.ghost{background:transparent;color:var(--brown);border-color:var(--line)}
  .btn.ghost:hover{background:var(--line-soft)}
  .btn.danger{background:#fff;border-color:#e7b7b3;color:var(--danger)}
  .btn.danger:hover{background:#fdeceb}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* Forms */
  label.fld{display:block;margin:10px 0}
  label.fld>span{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff;color:var(--text)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,160,81,.18)}
  textarea{resize:vertical;min-height:64px}
  .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}

  /* Project list */
  .proj{display:flex;flex-direction:column;gap:8px;padding:16px}
  .proj h3{font-size:16px}
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

  /* Board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .col{background:#f7f1e7;border:1px solid var(--line);border-radius:var(--radius);padding:10px;min-height:120px}
  .col h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
  .tcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer}
  .tcard:hover{border-color:var(--gold)}
  .tcard .t{font-weight:700;font-size:13.5px;margin-bottom:6px}
  .tcard .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tcard.sub{border-left:3px solid var(--gold)}

  /* Table */
  table.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden}
  table.tbl th{background:var(--line-soft);text-align:left;padding:9px 12px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  table.tbl td{padding:10px 12px;border-top:1px solid var(--line);vertical-align:middle}
  table.tbl tr:hover td{background:#fcf8f1}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(40,25,12,.45);display:flex;align-items:flex-start;justify-content:center;
    padding:30px 16px;z-index:50;overflow:auto}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(40,25,12,.35);overflow:hidden}
  .modal .head{display:flex;align-items:flex-start;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line);background:#fff}
  .modal .body{padding:18px 20px;max-height:70vh;overflow:auto}
  .modal .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
  .section{margin-top:18px;padding-top:14px;border-top:1px dashed var(--line)}
  .section h4{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:8px}

  /* Checklist & comments */
  .chk{display:flex;align-items:center;gap:8px;padding:5px 0}
  .chk input{width:auto}
  .chk.done span{text-decoration:line-through;color:var(--muted)}
  .cmt{padding:9px 0;border-bottom:1px solid var(--line-soft)}
  .cmt .who{font-weight:700;font-size:12.5px}
  .cmt .when{color:var(--muted);font-size:11px}
  .cmt .bd{margin-top:3px;white-space:pre-wrap}
  .mention{color:var(--brown);font-weight:700;background:#f6eede;border-radius:4px;padding:0 3px}

  /* Notifications */
  .notif-pop{position:absolute;top:50px;right:14px;width:340px;max-height:70vh;overflow:auto;z-index:40}
  .notif{padding:10px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .notif:hover{background:#fcf8f1}
  .notif.unread{background:#fbf3e2}
  .notif .nt{font-weight:700;font-size:13px}
  .notif .nb{font-size:12.5px;color:var(--muted)}

  /* Toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown-dark);color:#fff;
    padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);z-index:80;font-size:13.5px;max-width:90%}
  .toast.err{background:var(--danger)}

  /* Access screen */
  .access{max-width:480px;margin:8vh auto;text-align:center;padding:32px}
  .access .logo{font-size:30px;font-weight:800;color:var(--brown);margin-bottom:6px}
  .access .logo .dot{color:var(--gold)}

  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;
    animation:spin .8s linear infinite;margin:40px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Switch account link in topbar */
  .switch-link{margin-left:6px;color:#fff;font-size:12px;text-decoration:underline;opacity:.9;white-space:nowrap;flex-shrink:0}

  /* ── Tablet (≤820px) ── */
  @media(max-width:820px){
    .layout{flex-direction:column}
    .sidebar{width:auto;border-right:none;border-bottom:1px solid var(--line);padding:8px 12px;display:block;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
    .nav{display:flex;gap:4px;width:max-content}
    .nav a{margin-bottom:0;white-space:nowrap;padding:8px 12px}
    .board{grid-template-columns:repeat(2,1fr)}
    .main{padding:16px}
    .stat-grid{grid-template-columns:repeat(3,1fr)}
  }

  /* ── Mobile (≤640px) ── */
  @media(max-width:640px){
    /* Topbar */
    .topbar{padding:8px 12px;gap:8px}
    .brand small{display:none}
    .userchip .name-role{display:none}
    .switch-link{display:none}
    .topbar .btn.sm{padding:5px 8px;font-size:12px}

    /* Layout */
    .main{padding:12px 10px}
    .page-head{flex-wrap:wrap;gap:8px}
    .page-head h1{font-size:18px}

    /* Board: single column */
    .board{grid-template-columns:1fr}

    /* Stat cards: 2 columns */
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .stat .n{font-size:22px}

    /* Task tables: horizontal scroll */
    #taskList{overflow-x:auto;-webkit-overflow-scrolling:touch}
    #taskList table.tbl{min-width:520px}
    .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tbl-scroll table.tbl{min-width:500px}

    /* Hide less important columns in task tables on small screens */
    table.tbl th:nth-child(2),table.tbl td:nth-child(2){display:none} /* Project col */
    table.tbl th:nth-child(4),table.tbl td:nth-child(4){display:none} /* Priority col */

    /* Filters: 2 columns */
    .filters{grid-template-columns:1fr 1fr}

    /* Project grid: single column */
    .proj-grid{grid-template-columns:1fr}

    /* Modal: bottom sheet */
    .overlay{padding:0;align-items:flex-end}
    .modal{border-radius:14px 14px 0 0;max-width:100%;max-height:92vh}
    .modal .body{max-height:calc(92vh - 64px)}

    /* Notifications popup: full width */
    .notif-pop{width:calc(100vw - 20px);right:10px;left:10px;top:52px}

    /* Admin panel */
    .filters.wrap-form{grid-template-columns:1fr}
  }

  /* ── Small phones (≤400px) ── */
  @media(max-width:400px){
    .stat-grid{grid-template-columns:1fr 1fr}
    .filters{grid-template-columns:1fr}
    .brand .dot{display:none}
    .page-head h1{font-size:16px}
  }
</style>
