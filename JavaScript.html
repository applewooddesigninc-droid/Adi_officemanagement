<!-- Mobile detection — runs before anything else.
     Inside the Google Apps Script sandbox iframe, window.innerWidth can report
     the DESKTOP width even on a phone, so width-based @media queries fail to
     fire. We therefore detect the real device by user-agent and add class "mob"
     to <html>; all mobile layout is driven by html.mob rules, not @media. -->
<script>
(function () {
  var ua = navigator.userAgent || '';
  var isPhoneUA = /Mobi|Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(ua)
                  || (/iPad|Macintosh/i.test(ua) && 'ontouchend' in document); // iPadOS reports as Mac
  function applyClass() {
    var mob = isPhoneUA || window.innerWidth < 768;
    document.documentElement.classList.toggle('mob', mob);
  }
  applyClass();
  window.addEventListener('resize', applyClass, { passive: true });
  window.addEventListener('orientationchange', applyClass, { passive: true });
})();
</script>
<!-- DOMPurify: sanitizes the one place we inject HTML (comment @mention spans).
     Pin this version; upgrade deliberately after reviewing the changelog. -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
<script>
/* ADI Work Management — client SPA. Every server call is re-authorized on the
   server; the UI only hides controls the viewer may not use. */
(function () {
  'use strict';

  var RANK = { L1: 4, L2: 3, L3: 2, L4: 1 };
  var S = { boot: null, view: 'dashboard', projectId: null, filters: {}, notifOpen: false, modalTaskId: null };
  var _sync = { token: null, flying: false };

  /* ---------- server bridge ---------- */
  function call(fn) {
    var args = [].slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function (e) { reject(e); })[fn].apply(null, args);
    });
  }

  /* ---------- helpers ---------- */
  var $ = function (sel, el) { return (el || document).querySelector(sel); };
  function h(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

  // Validates a URL for use in href attributes.  h() escapes HTML entities but
  // does not block the javascript: protocol, which browsers execute on click.
  // Only https:// and http:// URLs are forwarded; everything else becomes '#'.
  function safeUrl(url) {
    if (!url) return '#';
    var s = String(url).trim();
    return /^https?:\/\//i.test(s) ? h(s) : '#';
  }

  // Highlights @mentions in a comment body.  The body MUST be HTML-escaped with
  // h() before calling this function; we then inject controlled <span> elements
  // and pass the result through DOMPurify to allow only those spans.
  function sanitizeMention(rawBody) {
    var escaped = h(rawBody);
    var withSpans = escaped.replace(
      /@([\w.\-]+(?:@[\w.\-]+)?)/g,
      '<span class="mention">@$1</span>'
    );
    if (typeof DOMPurify !== 'undefined') {
      return DOMPurify.sanitize(withSpans, {
        ALLOWED_TAGS: ['span'],
        ALLOWED_ATTR: ['class']
      });
    }
    return withSpans; // graceful fallback if CDN is unavailable
  }

  /**
   * Takes a flat array of tasks (each with parent_task_id) and returns them in
   * depth-first tree order with a `depth` field added.  Tasks whose parent is
   * not present in the array are treated as roots (depth 0), which correctly
   * handles ancestor-context rows that appear when a filter is active.
   */
  function buildFlatTree_(tasks) {
    var byId = {}, childMap = {};
    tasks.forEach(function (t) { byId[t.id] = t; });
    tasks.forEach(function (t) {
      var pid = t.parent_task_id;
      if (pid && byId[pid]) {
        if (!childMap[pid]) childMap[pid] = [];
        childMap[pid].push(t);
      }
    });
    var result = [];
    function visit(t, depth) {
      t._depth = depth;
      result.push(t);
      (childMap[t.id] || []).forEach(function (c) { visit(c, depth + 1); });
    }
    tasks.forEach(function (t) {
      if (!t.parent_task_id || !byId[t.parent_task_id]) visit(t, 0);
    });
    return result;
  }

  function stageClass(s) { return 'stage-' + String(s).toLowerCase().replace(/\s+/g, ''); }
  function initials(name) { return String(name || '?').trim().split(/\s+/).map(function (w){return w[0];}).slice(0,2).join('').toUpperCase(); }
  function switchAccountUrl() { var url = (S.boot && S.boot.webAppUrl) || location.href; return 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(url); }
  function fmtDate(d) { if (!d) return ''; return String(d).slice(0, 10); }
  function fmtWhen(iso) { if (!iso) return ''; return String(iso).replace('T', ' ').slice(0, 16); }
  function isMobile() { return document.documentElement.classList.contains('mob'); }
  function toast(msg, isErr) {
    var t = document.createElement('div');
    t.className = 'toast' + (isErr ? ' err' : ''); t.textContent = msg;
    document.body.appendChild(t); setTimeout(function () { t.remove(); }, 3200);
  }
  function errToast(e) { toast((e && e.message) ? e.message : String(e), true); }
  function busy(on) { var r = $('#root'); if (r) r.style.cursor = on ? 'progress' : ''; }

  function assignableFor(user, roster) {
    return roster.filter(function (u) { return u.active && RANK[u.level] <= RANK[user.level]; });
  }
  function userName(email) {
    var u = (S.boot.roster || []).filter(function (x){return x.email===email;})[0];
    return u ? u.name : email;
  }
  function priorityOptionsHtml(current) {

  function priBadge(pri) { return pri ? '<span class="badge pri-'+h(pri)+'">'+h(pri)+'</span>' : '<span class="small muted">—</span>'; }
  function dueCell(t) { return t.due_date ? (t.overdue ? '<span class="badge over">'+fmtDate(t.due_date)+'</span>' : fmtDate(t.due_date)) : '—'; }
  function statusControl(t) {

  }
  (function injectCss(){ if (document.getElementById('adi-inline-css') || !document.head) return;

      '.widget-head{display:flex;align-items:center;margin-bottom:10px}' +

      '.w-badge.alert{background:#fee2e2;color:#b91c1c}' +

      '.w-link:hover{text-decoration:underline}' +
      '.widget-list{list-style:none;padding:0;margin:0}' +

      '.widget-list li:last-child{border-bottom:none}' +

      '.wt{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}' +
      '.wm{display:block;font-size:11px;color:var(--muted,#8A7B6B)}' +
      '.w-empty{font-size:13px;color:var(--muted,#8A7B6B);padding:10px 0}' +
      '.emp-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--line-soft,#f0ebe4);font-size:12px}' +
      '.emp-row:last-child{border-bottom:none}' +
      '.emp-name{min-width:80px;max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}' +

      '.hist-entry{position:relative;padding:7px 0 7px 14px;border-bottom:1px solid var(--line-soft,#f0ebe4)}' +
      '.hist-entry:last-child{border-bottom:none}' +

  /* ---------- bootstrap ---------- */

      S.boot = b;
      renderShell();
      navigate('dashboard');
      refreshBell();
      syncReset(); // establish change-detection baseline after initial load
      setInterval(syncTick, 30000);
      var dl = ($('#deepLinkTask') || {}).value;
      if (dl) openTask(dl);
    }).catch(function (e) { renderAccess({ message: (e && e.message) || 'Failed to load.' }); });

      '</div>';

        '<h2 style="margin-bottom:8px">Access required</h2>' +
        '<p class="muted">' + h(b.message || 'You are not signed in.') + '</p>' +
        (b.email ? '<p class="small muted">Signed in as ' + h(b.email) + '</p>' : '') +

    projects:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',

    more:      '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2.1"/><circle cx="12" cy="12" r="2.1"/><circle cx="19" cy="12" r="2.1"/></svg>'

  function renderShell() {

      { v: 'dashboard', ic: '▦', t: 'Dashboard' },

    var mnav = [

        lbl('WhatsApp provider') +

        val('API key / token', wac.hasApiKey ? '•••••• (set)' : '(not set)') +
        val('API URL', wac.apiUrl || '—') +
        val('Sender / from', wac.from || '—') +
        '<div style="display:flex;gap:10px;margin-top:10px">' +
          '<button class="btn" style="flex:1;background:var(--m-pri);border-color:var(--m-pri);color:#fff;min-height:50px" onclick="App.editWaProvider()">Edit provider</button>' +
          '<button class="btn ghost" style="flex:1;min-height:50px" onclick="App.testWa()">Send test</button>' +
        '</div>' +
        '<button class="btn ghost" style="width:100%;min-height:48px;margin-top:10px" onclick="App.loadWaLogs()">View message log</button>' +
        '<div id="waLog" style="margin-top:12px"></div>';
    }).catch(errToast);
  }

  /* ---------- dashboard ---------- */
  function renderDashboard() {
    if (isMobile()) mAppbar({ title: 'Dashboard' });
    var main = $('#main');
    main.innerHTML = '<div class="spinner"></div>';
    call('getDashboard', S.filters).then(function (d) {
      if (isMobile()) { renderDashboardMobile(d); return; }
      var st = d.stats;
      var cards = [
        ['Projects', st.projects, ''], ['Open tasks', st.openTasks, ''],
        ['My pending', st.myPending, ''], ['My overdue', st.myOverdue, st.myOverdue ? 'alert' : ''],
        ['Awaiting my approval', st.awaitingApproval, ''], ['Avg completion', st.completionAvg + '%', '']
      ];
      var roster = S.boot.roster;
      main.innerHTML =
        '<div class="page-head"><h1>Dashboard</h1><div class="spacer"></div>' +
          (S.boot.canCreateProject ? '<button class="btn gold" onclick="App.newProject()">+ New project</button>' : '') +
        '</div>' +
        '<div class="stat-grid">' + cards.map(function (c) {
          return '<div class="card stat ' + c[2] + '"><div class="n">' + c[1] + '</div><div class="l">' + c[0] + '</div></div>';
        }).join('') + '</div>' +
        '<div class="card" style="padding:14px;margin-bottom:18px"><h4 style="margin-bottom:10px">Workflow distribution</h4>' + stageBar(d.stageCounts) + '</div>' +
        renderWidgets(d) + filtersBar(roster, d.projects) + '<div id="taskList"></div>';
      renderTaskRows(d.tasks);
    }).catch(errToast);
  }

  /* Mobile Home feed — design 02: stat tiles → workflow → needs attention → all tasks. */
  function renderDashboardMobile(d) {
    S._dashProjects = d.projects || [];
    var st = d.stats, w = d.widgets, stages = S.boot.meta.stages;
    var tiles = [
      ['projects', st.projects, 'Projects', ''], ['open', st.openTasks, 'Open tasks', ''],
      ['mypending', st.myPending, 'My pending', ''], ['awaiting', st.awaitingApproval, 'Awaiting me', ''],
      ['overdue', st.myOverdue, 'Overdue', st.myOverdue ? 'alert' : ''], ['avg', st.completionAvg + '%', 'Avg done', '']
    ];
    var statsHtml = '<div class="m-stats">' + tiles.map(function (c) {
      return '<div class="m-stat ' + c[3] + '" onclick="App.statTap(\'' + c[0] + '\')"><div class="n">' + c[1] + '</div><div class="l">' + c[2] + '</div></div>';
    }).join('') + '</div>';

    var counts = d.stageCounts, total = stages.reduce(function (s, k) { return s + (counts[k] || 0); }, 0) || 1;
    var colors = { 'To Do': '#9aa0a6', 'In Progress': '#2f6fb0', 'Review': '#C1A051', 'Completed': '#3f8f4f' };
    var bar = stages.map(function (k) { return '<i style="width:' + ((counts[k] || 0) / total * 100).toFixed(1) + '%;background:' + colors[k] + '"></i>'; }).join('');
    var legend = stages.map(function (k) { return h(k) + ' ' + (counts[k] || 0); }).join(' · ');
    var workflowHtml = '<div class="m-card m-workflow" style="margin-bottom:14px"><div class="m-cardh"><span class="t">Workflow distribution</span></div>' +
      '<div class="bar">' + bar + '</div><div class="legend">' + legend + '</div></div>';

    var nf = countFilters();
    var allH = '<div class="m-section-h"><span class="t">All tasks</span>' +
      '<button class="m-chip" style="background:#fff;border:1px solid var(--line)" onclick="App.openFilters()">Filter' + (nf ? ' · ' + nf : '') + '</button></div>';

    $('#main').innerHTML = statsHtml + workflowHtml + needsAttentionCard(w) + allH + '<div id="taskList" class="m-list"></div>';
    renderTaskRows(d.tasks);
  }

  function countFilters() {
    var f = S.filters, n = 0;
    ['q', 'project', 'assignee', 'stage', 'due'].forEach(function (k) { if (f[k]) n++; });
    return n;
  }

  /* "Needs attention" card with Overdue / Due today / This week mini-tabs (design 02). */
  function needsAttentionCard(w) {
    var sets = { overdue: w.overdue || [], today: w.dueToday || [], week: w.dueWeek || [] };
    var active = (S._naTab && sets[S._naTab]) ? S._naTab : 'overdue';
    function chip(key, label) {
      return '<button class="m-chip' + (active === key ? ' active' : '') + '" onclick="App.naTab(\'' + key + '\')">' +
        label + (sets[key].length ? ' ' + sets[key].length : '') + '</button>';
    }
    var list = sets[active];
    var items = list.length
      ? list.slice(0, 3).map(function (t) {
          return '<div onclick="App.openTask(\'' + h(t.id) + '\')" style="display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line-soft);cursor:pointer">' +
            '<div style="min-width:0"><div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + h(t.title) + '</div>' +
            '<div class="m-muted" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + h(t.project_name || '') + '</div></div>' +
            (t.due_date ? '<span style="color:var(--danger);font-weight:800;font-size:13px;white-space:nowrap">' + fmtDate(t.due_date).slice(5) + '</span>' : '') +
          '</div>';
        }).join('')
      : '<div class="m-muted" style="padding:10px 0;font-size:13px">Nothing here ✓</div>';
    return '<div class="m-card" style="margin-bottom:6px"><div class="m-cardh"><span class="t">Needs attention</span>' +
      '<button class="m-sheet-h" style="border:none;background:none;font-size:13px;color:var(--m-pri);font-weight:700" onclick="App.statTap(\'' + active + '\')">View all</button></div>' +
      '<div class="m-chips">' + chip('overdue', 'Overdue') + chip('today', 'Due today') + chip('week', 'This week') + '</div>' +
      items + '</div>';
  }

  /* ---------- dashboard widgets ---------- */
  function renderWidgets(d) {
    var w = d.widgets;

    function wHead(title, badge, filterVal) {
      return '<div class="widget-head">' +
        '<span class="widget-title">' + title + '</span>' +
        (badge !== null ? badge : '') +
        (filterVal ? '<span class="w-link" onclick="App.setDueFilter(\'' + h(filterVal) + '\')">View all →</span>' : '') +
      '</div>';
    }

    function taskList(items, showDate) {
      if (!items.length) return '<p class="w-empty">None right now ✓</p>';
      return '<ul class="widget-list">' + items.map(function (t) {
        var meta = [];
        if (showDate && t.due_date) meta.push(fmtDate(t.due_date));
        if (t.assignee_name) meta.push(h(t.assignee_name));
        if (t.project_name) meta.push(h(t.project_name));
        return '<li onclick="App.openTask(\'' + h(t.id) + '\')">' +
          '<span class="wt">' + h(t.title) + '</span>' +
          (meta.length ? '<span class="wm">' + meta.join(' · ') + '</span>' : '') +
        '</li>';
      }).join('') + '</ul>';
    }

    // 1. Overdue
    var overdueCount = w.overdue.length;
    var overdueBadge = overdueCount
      ? '<span class="w-badge alert">' + overdueCount + (overdueCount >= 8 ? '+' : '') + '</span>'
      : '';
    var overdueCard = '<div class="card widget">' +
      wHead('Overdue', overdueBadge, 'overdue') +
      taskList(w.overdue, true) + '</div>';

    // 2. Due today
    var todayCount = w.dueToday.length;
    var todayBadge = todayCount ? '<span class="w-badge warn">' + todayCount + '</span>' : '';
    var dueTodayCard = '<div class="card widget">' +
      wHead('Due today', todayBadge, 'today') +
      taskList(w.dueToday, false) + '</div>';

    // 3. Due this week
    var weekCount = w.dueWeek.length;
    var weekBadge = weekCount ? '<span class="w-badge">' + weekCount + (weekCount >= 8 ? '+' : '') + '</span>' : '';
    var dueWeekCard = '<div class="card widget">' +
      wHead('Due this week', weekBadge, 'week') +
      taskList(w.dueWeek, true) + '</div>';

    // 4. Tasks by employee
    var empMaxOpen = w.byEmployee.reduce(function (m, u) { return Math.max(m, u.open); }, 1);
    var empBody = w.byEmployee.length
      ? w.byEmployee.slice(0, 8).map(function (u) {
          var pct = Math.round(u.open / empMaxOpen * 100);
          return '<div class="emp-row">' +
            '<span class="emp-name" title="' + h(u.name) + '">' + h(u.name.split(' ')[0]) + '</span>' +
            '<div class="prog" style="flex:1;height:7px"><i style="width:' + pct + '%"></i></div>' +
            '<span style="min-width:22px;text-align:right;font-size:12px">' + u.open + '</span>' +
            (u.overdue ? '<span class="w-badge alert" style="margin-left:2px">' + u.overdue + '↑</span>' : '') +
          '</div>';
        }).join('')
      : '<p class="w-empty">No open assignments.</p>';
    var empCard = '<div class="card widget">' +
      wHead('Tasks by employee', null, null) + empBody + '</div>';

    // 5. Project completion
    var projBody = d.projects.length
      ? d.projects.slice(0, 8).map(function (p) {
          var pct = p.completion;
          var barColor = pct >= 100 ? '#3f8f4f' : pct >= 60 ? '#2f6fb0' : pct >= 30 ? '#C1A051' : '#e57373';
          return '<div class="proj-row">' +
            '<div class="row" style="margin-bottom:3px">' +
              '<span class="small grow" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px" title="' + h(p.label || p.name) + '">' + h(p.label || p.name) + '</span>' +
              '<span class="small muted" style="margin-left:8px;flex-shrink:0">' + pct + '%</span>' +
            '</div>' +
            '<div class="prog" style="height:6px"><i style="width:' + pct + '%;background:' + barColor + '"></i></div>' +
          '</div>';
        }).join('')
      : '<p class="w-empty">No projects yet.</p>';
    var projCard = '<div class="card widget">' +
      wHead('Project completion', null, null) + projBody + '</div>';

    // 6. Recently updated
    var recentBody = w.recentlyUpdated.length
      ? '<ul class="widget-list">' + w.recentlyUpdated.map(function (t) {
          return '<li onclick="App.openTask(\'' + h(t.id) + '\')">' +
            '<span class="wt">' +
              '<span class="badge ' + stageClass(t.stage) + '" style="font-size:10px;padding:1px 5px">' + h(t.stage) + '</span> ' +
              h(t.title) +
            '</span>' +
            '<span class="wm">' + h(t.assignee_name) + ' · ' + fmtWhen(t.updated_at) + '</span>' +
          '</li>';
        }).join('') + '</ul>'
      : '<p class="w-empty">No recent activity.</p>';
    var recentCard = '<div class="card widget">' +
      wHead('Recently updated', null, null) + recentBody + '</div>';

    // 7. Unassigned tasks
    var unassignedCount = w.unassigned.length;
    var unassignedBadge = unassignedCount ? '<span class="w-badge warn">' + unassignedCount + (unassignedCount >= 8 ? '+' : '') + '</span>' : '';
    var unassignedCard = '<div class="card widget">' +
      wHead('Unassigned tasks', unassignedBadge, null) +
      taskList(w.unassigned, false) + '</div>';

    return '<div class="widget-grid">' +
      overdueCard + dueTodayCard + dueWeekCard +
      empCard + projCard + recentCard +
      unassignedCard +
    '</div>';
  }

  function stageBar(counts) {
    var total = Object.keys(counts).reduce(function (s, k){return s + counts[k];}, 0) || 1;
    var colors = { 'To Do': '#9aa0a6', 'In Progress': '#2f6fb0', 'Review': '#C1A051', 'Completed': '#3f8f4f' };
    return '<div class="prog" style="display:flex;height:14px">' +
      Object.keys(counts).map(function (k) {
        var w = (counts[k] / total * 100).toFixed(1);
        return '<i style="width:' + w + '%;background:' + colors[k] + '" title="' + h(k) + ': ' + counts[k] + '"></i>';
      }).join('') + '</div>' +
      '<div class="row wrap small muted" style="margin-top:8px">' +
        Object.keys(counts).map(function (k) {
          return '<span><span class="badge ' + stageClass(k) + '">' + h(k) + '</span> ' + counts[k] + '</span>';
        }).join('&nbsp;&nbsp;') + '</div>';
  }

  function filtersBar(roster, projects) {
    function opts(list, val, lbl) {
      return list.map(function (o) {
        return '<option value="' + h(o[val]) + '"' + (S.filters[lbl] === o[val] ? ' selected' : '') + '>' + h(o.txt || o[val]) + '</option>';
      }).join('');
    }
    var stageOpts = S.boot.meta.stages.map(function (s){return {value:s,txt:s};});
    var priOpts = S.boot.meta.priorities.map(function (p){return {value:p,txt:p};});
    var projOpts = projects.map(function (p){return {id:p.id,txt:p.label||p.name};});
    var userOpts = roster.filter(function(u){return u.active;}).map(function (u){return {email:u.email,txt:u.name};});
    return '<div class="filters">' +
      '<input id="fq" placeholder="Search tasks…" value="' + h(S.filters.q || '') + '" oninput="App.debounceFilter()">' +
      '<select id="fproject" onchange="App.applyFilters()"><option value="">All projects</option>' +
        projOpts.map(function(o){return '<option value="'+h(o.id)+'"'+(S.filters.project===o.id?' selected':'')+'>'+h(o.txt)+'</option>';}).join('') + '</select>' +
      '<select id="fassignee" onchange="App.applyFilters()"><option value="">Any assignee</option>' +
        userOpts.map(function(o){return '<option value="'+h(o.email)+'"'+(S.filters.assignee===o.email?' selected':'')+'>'+h(o.txt)+'</option>';}).join('') + '</select>' +
      '<select id="fstage" onchange="App.applyFilters()"><option value="">Any stage</option>' +
        stageOpts.map(function(o){return '<option value="'+h(o.value)+'"'+(S.filters.stage===o.value?' selected':'')+'>'+h(o.txt)+'</option>';}).join('') + '</select>' +
      '<select id="fdue" onchange="App.applyFilters()">' +
        ['','overdue','today','week'].map(function(v){var lbl={'':'Any due date',overdue:'Overdue',today:'Due today',week:'Due this week'}[v];return '<option value="'+v+'"'+(S.filters.due===v?' selected':'')+'>'+lbl+'</option>';}).join('') + '</select>' +
      '<button class="btn ghost" onclick="App.clearFilters()">Clear</button>' +
    '</div>';
  }

  // The single most relevant one-tap status action for a task card, by stage.
  function cardStageAction(t) {
    var ns = t.nextStages || [];
    if (!ns.length) return null;
    if (t.stage === 'To Do' && ns.indexOf('In Progress') >= 0) return { s: 'In Progress', l: 'Start' };
    if (ns.indexOf('Review') >= 0) return { s: 'Review', l: 'Submit' };
    if (ns.indexOf('Completed') >= 0) return { s: 'Completed', l: t.stage === 'Review' ? 'Approve' : 'Mark done' };
    if (ns.indexOf('In Progress') >= 0) return { s: 'In Progress', l: t.stage === 'Completed' ? 'Reopen' : 'Resume' };
    return { s: ns[0], l: '→ ' + ns[0] };
  }

  function priPill(p) { return p ? '<span class="badge pri-' + h(p) + '">' + h(p) + '</span>' : ''; }

  /* In-place status control button (My Tasks) → opens the status options sheet. */
  function mStatusBtn(t) {
    return '<button class="m-statusctl" onclick="event.stopPropagation();App.statusSheet(\'' + h(t.id) + '\')">' + h(t.stage) + ' ▾</button>';
  }

  /* The repeating task card used on every mobile list (dashboard, board, My Tasks).
     opts.statusCtl → show the in-place Status control (My Tasks). ⋯ opens Quick Actions. */
  function mTaskCard(t, opts) {
    opts = opts || {};
    var sub = (t._depth || 0) > 0;
    var proj = t.project_name || t.project_id || '';
    var showDue = opts.statusCtl || opts.showDue; // dashboard cards omit the date (design 02)
    var due = (showDue && t.due_date) ? '<span class="due' + (t.overdue ? ' over' : '') + '">' + (opts.statusCtl ? 'Due ' : '') + fmtDate(t.due_date) + '</span>' : '';
    var pills = opts.statusCtl
      ? '<div class="pills">' + priPill(t.priority) + due + '<span class="spacer"></span>' + mStatusBtn(t) + '</div>'
      : '<div class="pills"><span class="badge ' + stageClass(t.stage) + '">' + h(t.stage) + '</span>' + priPill(t.priority) + due + '</div>';
    return '<div class="m-task' + (sub ? ' sub' : '') + '" onclick="App.openTask(\'' + h(t.id) + '\')">' +
      '<button class="more" aria-label="Quick actions" onclick="event.stopPropagation();App.quickActions(\'' + h(t.id) + '\')">⋯</button>' +
      '<div class="t">' + (sub ? '<span class="m-task-indent">↳ </span>' : '') + h(t.title) + '</div>' +
      '<div class="meta"><span class="proj">' + h(proj) + '</span><span class="who">' + h(t.assignee_name || 'Unassigned') + '</span></div>' +
      pills +
    '</div>';
  }

  function subtaskProgressHtml(t) {
    if (!t.subtaskCount) return '';
    var pct = t.subtaskProgress !== null && t.subtaskProgress !== undefined ? t.subtaskProgress : 0;
    return '<div style="display:flex;align-items:center;gap:5px;margin-top:3px">' +
      '<div class="prog" style="flex:1;max-width:80px;height:3px">' +
        '<i style="width:' + pct + '%"></i>' +
      '</div>' +
      '<span class="small muted" style="white-space:nowrap">' +
        t.subtasksDone + '/' + t.subtaskCount + ' done' +
      '</span>' +
    '</div>';
  }

  function dashRowCells(t) {
    var indent = (t._depth || 0) * 20;
    var titlePrefix = t._depth > 0
      ? '<span style="color:var(--muted,#8A7B6B);margin-right:4px">' + ('↳') + '</span>'
      : '';
    var assignee = t.canReassign
      ? '<select class="qedit" onclick="event.stopPropagation()" onchange="App.quickAssignee(\''+h(t.id)+'\',this.value)">'+assigneeOptionsHtml(t.assignee_email)+'</select>'
      : (t.assignee_name ? h(t.assignee_name) : '<span class="small muted">Unassigned</span>');
    var priority = t.canEditDef
      ? '<select class="qedit" onclick="event.stopPropagation()" onchange="App.quickField(\''+h(t.id)+'\',\'priority\',this.value)">'+priorityOptionsHtml(t.priority)+'</select>'
      : priBadge(t.priority);
    var due = t.canEditDef
      ? '<input type="date" class="qedit" onclick="event.stopPropagation()" value="'+h(fmtDate(t.due_date))+'" onchange="App.quickField(\''+h(t.id)+'\',\'due_date\',this.value)">'
      : '<span class="small">'+dueCell(t)+'</span>';
    return '<td onclick="App.openTask(\''+h(t.id)+'\')" style="cursor:pointer;padding-left:'+(16+indent)+'px">' +
        titlePrefix+'<b>'+h(t.title)+'</b>'+subtaskProgressHtml(t)+'</td>' +
      '<td class="small" onclick="App.openTask(\''+h(t.id)+'\')" style="cursor:pointer">'+h(t.project_name||t.project_id)+'</td>' +
      '<td class="small">'+assignee+'</td><td>'+priority+'</td><td>'+due+'</td>' +
      '<td onclick="App.openTask(\''+h(t.id)+'\')" style="cursor:pointer"><span class="badge '+stageClass(t.stage)+'">'+h(t.stage)+'</span></td>';
  }
  function renderTaskRows(tasks) {
    var host = $('#taskList'); if (!host) return;
    if (!tasks.length) { host.innerHTML = '<div class="card" style="padding:24px"><p class="muted center">No tasks match.</p></div>'; return; }
    var ordered = buildFlatTree_(tasks);
    if (isMobile()) {
      host.innerHTML = ordered.map(function (t) { return mTaskCard(t); }).join('');
    } else {
      host.innerHTML = '<table class="tbl"><thead><tr><th>Task</th><th>Project</th><th>Assignee</th><th>Priority</th><th>Due</th><th>Stage</th></tr></thead><tbody>' +
        ordered.map(function (t) { return '<tr data-task-id="'+h(t.id)+'">'+dashRowCells(t)+'</tr>'; }).join('') + '</tbody></table>';
    }
  }
  function patchDashRow(t) {
    if (!t || !t.id) return;
    var tr = document.querySelector('#taskList tr[data-task-id="'+t.id+'"]');
    if (tr) tr.innerHTML = dashRowCells(t);
  }
  var _projCache = {};
  function projName(id) { return _projCache[id] || id; }

  /* ---------- projects ---------- */
  function renderProjects() {
    if (isMobile()) mAppbar({ title: 'Projects' });
    var main = $('#main'); main.innerHTML = '<div class="spinner"></div>';
    call('listProjects').then(function (ps) {
      ps.forEach(function (p) { _projCache[p.id] = p.label || p.name; });
      if (isMobile()) {
        main.innerHTML =
          (S.boot.canCreateProject ? '<button class="m-addmember" style="background:var(--m-gold);color:#3a2a10" onclick="App.newProject()"><span style="font-size:20px">+</span> New project</button>' : '') +
          (ps.length ? '<div class="m-list">' + ps.map(mProjCard).join('') + '</div>' : '<div class="m-empty">No projects yet.</div>');
        return;
      }
      main.innerHTML =
        '<div class="page-head"><h1>Projects</h1><div class="spacer"></div>' +
          (S.boot.canCreateProject ? '<button class="btn gold" onclick="App.newProject()">+ New project</button>' : '') + '</div>' +
        renderProjectsByYear(ps);
    }).catch(errToast);
  }

  /* Year & category Projects layout (desktop, design request).
     Years descend top→bottom (divider between); within each year, three category
     columns (Residential · Commercial · Industrial), each a 2-wide card grid. */
  function renderProjectsByYear(ps) {
    if (!ps.length) return '<div class="card" style="padding:28px"><p class="muted center">No projects yet.</p></div>';
    var CATS = S.boot.meta.projectTypes || ['Residential', 'Commercial', 'Industrial'];
    var categorized = ps.filter(function (p) { return CATS.indexOf(p.type) >= 0 && p.year; });
    var uncat = ps.filter(function (p) { return !(CATS.indexOf(p.type) >= 0 && p.year); });
    var years = {};
    categorized.forEach(function (p) { (years[p.year] = years[p.year] || []).push(p); });
    var yrs = Object.keys(years).sort(function (a, b) { return b.localeCompare(a); });
    var html = yrs.map(function (yr, i) {
      return (i > 0 ? '<hr class="year-divider">' : '') +
        '<div class="year-section"><div class="year-head">' + h(yr) + '</div><div class="cat-row">' +
        CATS.map(function (cat) {
          var cards = years[yr].filter(function (p) { return p.type === cat; });
          return '<div class="cat-col"><h3 class="cat-h cat-' + cat.toLowerCase() + '">' + h(cat) + '<span>' + cards.length + '</span></h3>' +
            '<div class="cat-grid">' + (cards.length ? cards.map(projCardCompact).join('') : '<div class="cat-empty">No projects</div>') + '</div></div>';
        }).join('') + '</div></div>';
    }).join('');
    if (uncat.length) {
      html += (yrs.length ? '<hr class="year-divider">' : '') +
        '<div class="year-section"><div class="year-head">Uncategorized <span>add a type &amp; year to file these</span></div>' +
        '<div class="proj-grid">' + uncat.map(projCard).join('') + '</div></div>';
    }
    return html;
  }
  function projCardCompact(p) {
    return '<div class="card projc" onclick="App.openProject(\'' + h(p.id) + '\')">' +
      '<div class="projc-name">' + h(p.label || p.name) + '</div>' +
      '<div style="margin:7px 0"><span class="badge status">' + h(p.status) + '</span></div>' +
      '<div class="prog" style="height:6px"><i style="width:' + p.completion + '%"></i></div>' +
      '<div class="small muted" style="margin-top:5px">' + p.completion + '% · ' + p.openCount + '/' + p.taskCount + ' open</div>' +
      (canCreateTaskInProject(p) ? '<button class="btn gold sm" style="width:100%;margin-top:9px" onclick="event.stopPropagation();App.newTask(\'' + h(p.id) + '\')">+ Task</button>' : '') +
    '</div>';
  }
  function projYearOptions(cur) {
    var y = new Date().getFullYear(), def = cur || String(y), o = '';
    for (var i = y + 1; i >= y - 10; i--) o += '<option' + (String(def) === String(i) ? ' selected' : '') + '>' + i + '</option>';
    return o;
  }
  function projTypeOptions(cur) {
    return (S.boot.meta.projectTypes || ['Residential', 'Commercial', 'Industrial']).map(function (t) {
      return '<option' + (cur === t ? ' selected' : '') + '>' + h(t) + '</option>';
    }).join('');
  }
  function projStatusPill(s) {
    var bg = s === 'Active' ? '#e6f3e9' : s === 'Completed' ? '#e7f0fa' : '#fff3e0';
    var fg = s === 'Active' ? '#2f7a40' : s === 'Completed' ? '#235c97' : '#a6611a';
    return '<span class="badge" style="background:' + bg + ';color:' + fg + '">' + h(s) + '</span>';
  }
  /* Mobile project card (design 05). */
  function mProjCard(p) {
    var canAdd = canCreateTaskInProject(p);
    return '<div class="m-card m-proj">' +
      '<div class="top"><h3>' + h(p.label || p.name) + '</h3>' + projStatusPill(p.status) + '</div>' +
      '<div class="sub">Owner: ' + h(p.owner_name) + ' · ' + p.openCount + ' open / ' + p.taskCount + ' tasks</div>' +
      '<div class="bar"><i style="width:' + p.completion + '%"></i></div>' +
      '<div class="pct">' + p.completion + '% complete</div>' +
      '<div class="acts">' +
        (canAdd ? '<button class="btn" style="background:var(--m-gold);border-color:var(--m-gold);color:#3a2a10" onclick="App.newTask(\'' + h(p.id) + '\')">+ Task</button>' : '') +
        '<button class="btn ghost" onclick="App.openProject(\'' + h(p.id) + '\')">Open board</button>' +
      '</div>' +
    '</div>';
  }

  function canCreateTaskInProject(p) {
    var u = S.boot.user; if (!p) return false;
    if (u.level === 'L1') return true;
    if (u.level === 'L2') { if (p.owner_email === u.email) return true; var o = (S.boot.roster.filter(function (x) { return x.email === p.owner_email; })[0] || {}); return RANK[o.level] < RANK[u.level]; }
    return false;
  }

  function projCard(p) {
    return '<div class="card proj">' +
      '<div class="row"><h3 class="grow">' + h(p.label || p.name) + '</h3>' +
        '<span class="badge status">' + h(p.status) + '</span></div>' +
      '<div class="small muted">' + h(p.description || 'No description') + '</div>' +
      '<div class="small muted">Owner: ' + h(p.owner_name) + ' · ' + p.openCount + ' open / ' + p.taskCount + ' tasks</div>' +
      '<div class="prog"><i style="width:' + p.completion + '%"></i></div>' +
      '<div class="row small"><span class="muted grow">' + p.completion + '% complete</span>' +
        (canCreateTaskInProject(p) ? '<button class="btn gold sm" onclick="event.stopPropagation();App.newTask(\'' + h(p.id) + '\')">+ Task</button>' : '') + '<button class="btn sm" onclick="App.openProject(\'' + h(p.id) + '\')">Open board</button></div>' +
    '</div>';
  }

  function openProject(id) {
    S.projectId = id; var main = $('#main'); main.innerHTML = '<div class="spinner"></div>';
    Promise.all([call('listProjects'), call('listProjectTasks', id)]).then(function (res) {
      var p = res[0].filter(function (x){return x.id===id;})[0] || { name: 'Project' };
      res[0].forEach(function (x){_projCache[x.id]=x.name;});
      var tasks = res[1];
      if (isMobile()) { S._boardData = { p: p, id: id, tasks: tasks }; renderBoardMobile(); return; }
      var byStage = {}; S.boot.meta.stages.forEach(function (s){byStage[s]=[];});
      tasks.filter(function(t){return !t.parent_task_id;}).forEach(function (t){ (byStage[t.stage]||[]).push(t); });
      var subByParent = {}; tasks.filter(function(t){return t.parent_task_id;}).forEach(function(t){ (subByParent[t.parent_task_id]=subByParent[t.parent_task_id]||[]).push(t); });

      var canAddTask = canCreateTaskInProject(p);
      var addHint = (!canAddTask && S.boot.user.level === 'L2') ? '<span class="small muted" style="margin-left:8px">Only the owner (' + h(p.owner_name) + ') or a Director can add tasks here</span>' : '';
      main.innerHTML =
        '<div class="page-head"><button class="btn ghost sm" onclick="App.nav(\'projects\')">← Projects</button>' +
          '<h1 style="margin-left:6px">' + h(p.label || p.name) + '</h1>' +
          '<span class="badge status">' + h(p.status) + '</span><div class="spacer"></div>' +
          (canEditProj(p) ? '<button class="btn ghost sm" onclick="App.editProject(\'' + h(id) + '\')">Edit</button>' : '') +
          (canAddTask ? '<button class="btn gold" onclick="App.newTask(\'' + h(id) + '\')">+ New task</button>' : addHint) +
        '</div>' +
        '<div class="board">' + S.boot.meta.stages.map(function (s) {
          return '<div class="col"><h4>' + h(s) + '<span>' + byStage[s].length + '</span></h4>' +
            byStage[s].map(function (t) { return taskCard(t, subByParent[t.id] || []); }).join('') + (canAddTask && s === 'To Do' ? '<button class="btn ghost sm" style="width:100%;margin-top:4px" onclick="App.newTask(\'' + h(id) + '\')">+ Add</button>' : '') + '</div>';
        }).join('') + '</div>';
    }).catch(errToast);
  }

  function taskCard(t, subs) {
    return '<div class="tcard" onclick="App.openTask(\'' + h(t.id) + '\')">' +
      '<div class="t">' + h(t.title) + '</div>' +
      '<div class="meta">' +
        '<span class="badge pri-' + h(t.priority) + '">' + h(t.priority) + '</span>' +
        (t.due_date ? '<span class="badge ' + (t.overdue ? 'over' : 'status') + '">' + fmtDate(t.due_date) + '</span>' : '') +
        '<span class="small muted">' + h(t.assignee_name) + '</span>' +
      '</div>' +
      (subs.length ? '<div class="small muted" style="margin-top:6px">▸ ' + subs.length + ' subtask' + (subs.length>1?'s':'') + '</div>' : '') +
    '</div>';
  }

  function canEditProj(p) {
    var u = S.boot.user;
    return u.level === 'L1' || (u.level === 'L2' && p.owner_email === u.email);
  }

  /* Mobile project board — swipeable stage tabs (design 06). */
  function renderBoardMobile() {
    var bd = S._boardData; if (!bd) return;
    var p = bd.p, tasks = bd.tasks, stages = S.boot.meta.stages;
    mAppbar({ title: p.label || p.name, back: 'App.nav(\'projects\')', plain: true, navKey: 'projects' });
    var byStage = {}; stages.forEach(function (s) { byStage[s] = []; });
    tasks.forEach(function (t) { (byStage[t.stage] = byStage[t.stage] || []).push(t); });
    var active = (S._boardStage && byStage[S._boardStage]) ? S._boardStage : stages[0];
    var tabs = '<div class="m-stagetabs">' + stages.map(function (s) {
      return '<button class="m-stagetab' + (active === s ? ' active' : '') + '" onclick="App.boardStage(\'' + h(s) + '\')">' + h(s) + '<span class="ct">' + byStage[s].length + '</span></button>';
    }).join('') + '</div>';
    var list = byStage[active] || [];
    var body = list.length
      ? list.map(function (t) { t._depth = t.parent_task_id ? 1 : 0; return mTaskCard(t, { showDue: true }); }).join('')
      : '<div class="m-empty">No tasks in ' + h(active) + '.</div>';
    $('#main').innerHTML = tabs + '<div class="m-list">' + body + '</div>';
  }

  /* ---------- my tasks ---------- */
  function renderMyTasks() {
    if (isMobile()) mAppbar({ title: 'My Tasks' });
    var main = $('#main'); main.innerHTML = '<div class="spinner"></div>';
    call('listMyWork').then(function (w) {
      if (isMobile()) return renderMyTasksMobile(w);
      main.innerHTML = '<div class="page-head"><h1>My Tasks</h1></div>' +
        (w.awaiting.length ? '<h4 style="margin:6px 0 8px">Awaiting my approval (' + w.awaiting.length + ')</h4>' + myTaskTable(w.awaiting, true) : '') +
        '<h4 style="margin:16px 0 8px">Assigned to me (' + w.assignedToMe.length + ')</h4>' + myTaskTable(w.assignedToMe, false) +
        '<h4 style="margin:16px 0 8px">Assigned by me (' + w.assignedByMe.length + ')</h4>' + myTaskTable(w.assignedByMe, true);
    }).catch(errToast);
  }
  /* Mobile My Tasks — segmented control (Awaiting · To me · By me) + status control (design 04). */
  function renderMyTasksMobile(w) {
    var buckets = { awaiting: w.awaiting, tome: w.assignedToMe, byme: w.assignedByMe };
    var active = (S._mtTab && buckets[S._mtTab]) ? S._mtTab : 'awaiting';
    var seg = '<div class="m-seg">' +
      [['awaiting', 'Awaiting', w.awaiting], ['tome', 'To me', w.assignedToMe], ['byme', 'By me', w.assignedByMe]].map(function (t) {
        return '<button class="' + (active === t[0] ? 'active' : '') + '" onclick="App.mtTab(\'' + t[0] + '\')">' + t[1] + ' ' + t[2].length + '</button>';
      }).join('') + '</div>';
    var list = buildFlatTree_(buckets[active]);
    var body = list.length ? list.map(function (t) { return mTaskCard(t, { statusCtl: true }); }).join('') : '<div class="m-empty">Nothing here.</div>';
    $('#main').innerHTML = seg + '<div class="m-list">' + body + '</div>';
  }
  function myTaskTable(tasks, withAssignee) {
    if (!tasks.length) return '<div class="card" style="padding:16px"><p class="muted center small">Nothing here.</p></div>';
    var ordered = buildFlatTree_(tasks);
    if (isMobile()) {
      return '<div class="m-task-list">' + ordered.map(taskMobileCard).join('') + '</div>';
    }
    var head = '<tr><th>Task</th><th>Project</th>' + (withAssignee ? '<th>Assignee</th>' : '') + '<th>Priority</th><th>Due</th><th>Status</th></tr>';
    return '<div class="tbl-scroll"><table class="tbl"><thead>' + head + '</thead><tbody>' +
      ordered.map(function (t) { return '<tr data-task-id="'+h(t.id)+'">'+myCells(t, withAssignee)+'</tr>'; }).join('') + '</tbody></table></div>';
  }
  function myCells(t, withAssignee) {
    var indent = (t._depth || 0) * 20;
    var prefix = t._depth > 0 ? '<span style="color:var(--muted,#8A7B6B);margin-right:4px">↳</span>' : '';
    return '<td onclick="App.openTask(\''+h(t.id)+'\')" style="cursor:pointer;padding-left:'+(16+indent)+'px">' +
        prefix+'<b>'+h(t.title)+'</b>'+subtaskProgressHtml(t)+'</td>' +
      '<td class="small" onclick="App.openTask(\''+h(t.id)+'\')" style="cursor:pointer">'+h(t.project_name||t.project_id)+'</td>' +
      (withAssignee ? '<td class="small">'+(t.assignee_name?h(t.assignee_name):'<span class="small muted">Unassigned</span>')+'</td>' : '') +
      '<td>'+priBadge(t.priority)+'</td><td class="small">'+dueCell(t)+'</td><td>'+statusControl(t)+'</td>';
  }

  /* ---------- task detail ---------- */
  function openTask(id) {
    busy(true);
    call('getTaskDetail', id).then(function (d) { busy(false); renderTaskModal(d); }).catch(function (e) { busy(false); errToast(e); });
  }

  /* Router: every existing call site (openTask + the inline App actions) goes
     through here, so it renders the full-screen page on mobile and the dialog on
     desktop without changing those call sites. */
  function renderTaskModal(d) {
    if (isMobile()) renderTaskDetailMobile(d); else renderTaskModalDesktop(d);
  }

  function assignOptsFor(d) {
    return (d.assignable || []).map(function (u) {
      return '<option value="' + h(u.email) + '"' + (u.email === d.assignee_email ? ' selected' : '') + '>' + h(u.name) + '</option>';
    }).join('');
  }

  /* Full-screen task detail (design 07) — reuses the same checklist/subtask/
     attachment/comment/history helpers and stage actions as the desktop dialog. */
  function renderTaskDetailMobile(d) {
    S.modalTaskId = d.id;
    S._prevView = (S.view === 'admin' || S.view === 'settings') ? 'dashboard' : S.view;
    document.documentElement.classList.add('detail-open');
    mAppbar({ title: 'Task', back: 'App.closeDetail()', plain: true });
    var p = d.perms, id = d.id, primary = '';
    if (p.advance && d.stage === 'To Do') primary = detailBtn('startTask', id, 'Start');
    else if (p.advance && d.stage === 'In Progress') primary = detailBtn('submitForReview', id, 'Submit for review');
    else if (p.selfSubtask && d.stage !== 'Completed') primary = detailBtn('approveTask', id, 'Mark complete');
    else if (p.approve && d.stage === 'Review') primary = detailBtn('approveTask', id, 'Approve');
    else if (p.approve && d.stage === 'Completed') primary = '<button class="primary" style="background:#fff;border:1px solid var(--line);color:var(--m-pri)" onclick="App.stage(\'reopenTask\',\'' + h(id) + '\')">Reopen</button>';
    var sendBack = (p.approve && d.stage === 'Review') ? '<button class="danger-act" onclick="App.sendBack(\'' + h(id) + '\')">Send back</button>' : '';
    var doneCt = d.checklist.filter(function (c) { return c.done; }).length;

    var html = '<div class="m-detail">' +
      '<div class="dhead"><span class="badge ' + stageClass(d.stage) + '">' + h(d.stage) + '</span>' + priPill(d.priority) +
        (d.overdue ? '<span class="badge over">Overdue</span>' : '') + '<span class="dproj">' + h(d.project_name) + '</span></div>' +
      '<h1>' + h(d.title) + '</h1>' +
      (d.description ? '<p style="white-space:pre-wrap;margin:10px 0 0;line-height:1.5">' + h(d.description) + '</p>' : '') +
      primary + sendBack +
      '<div class="m-card" style="margin-bottom:12px">' +
        '<div class="m-kv"><span class="k">Assignee</span><span class="v">' + h(d.assignee_name || 'Unassigned') + '</span></div>' +
        '<div class="m-kv"><span class="k">Priority</span><span class="v">' + h(d.priority || '—') + '</span></div>' +
        '<div class="m-kv"><span class="k">Due date</span><span class="v">' + (d.due_date ? h(fmtDate(d.due_date)) : '—') + '</span></div>' +
        '<div class="m-kv"><span class="k">Estimate</span><span class="v">' + (d.est_hours === '' || d.est_hours == null ? '—' : h(d.est_hours) + ' h') + '</span></div>' +
        '<div class="m-kv"><span class="k">Created by</span><span class="v">' + h(d.creator_name) + '</span></div>' +
      '</div>' +
      '<div class="m-card" style="margin-bottom:12px"><div class="m-cardh"><span class="t">Checklist</span><span class="c">' + doneCt + ' / ' + d.checklist.length + '</span></div>' +
        checklistHtml(d.checklist, p.editExecution) +
        (p.editExecution ? '<div class="row" style="margin-top:10px;gap:8px"><input id="chkNew" placeholder="Add item…" style="flex:1"><button class="btn sm" onclick="App.addChk(\'' + h(id) + '\')">Add</button></div>' : '') +
      '</div>' +
      '<button class="m-accordion" onclick="App.toggleAcc(\'mSubs\')">Subtasks · ' + (d.subtasks ? d.subtasks.length : 0) + '<span class="chev">›</span></button>' +
      '<div id="mSubs" class="hidden" style="margin-top:10px">' + subtasksHtml(d.subtasks) +
        (p.canCreateSubtask ? '<button class="btn ghost sm" style="margin-top:8px" onclick="App.newSubtask(\'' + h(id) + '\')">+ Add subtask</button>' : '') + '</div>' +
      (p.editDefinition ? '<button class="m-accordion" style="margin-top:12px" onclick="App.toggleAcc(\'mEditor\')">Edit details<span class="chev">›</span></button><div id="mEditor" class="hidden" style="margin-top:10px">' + defEditor(d, assignOptsFor(d), p) + '</div>' : '') +
      '<div class="section"><div class="m-cardh"><span class="t">Attachments</span></div><div id="attList">' + attHtml(d.attachments, S.boot.user) + '</div>' +
        (p.comment ? '<div class="row wrap" style="margin-top:8px"><button class="btn ghost sm" onclick="App.pickFile(\'' + h(id) + '\')">⬆ Upload</button><button class="btn ghost sm" onclick="App.linkFile(\'' + h(id) + '\')">🔗 Link</button><input type="file" id="fileInput" class="hidden"></div>' : '') + '</div>' +
      '<div class="section"><div class="m-cardh"><span class="t">Comments</span></div><div id="cmtList">' + commentsHtml(d.comments) + '</div></div>' +
      '<div class="section"><div class="m-cardh"><span class="t">History</span></div>' + activityHtml(d.activity) + '</div>' +
      (p.editDefinition ? '<button class="danger-act" style="margin-top:16px" onclick="App.deleteTask(\'' + h(id) + '\')">Delete task</button>' : '') +
    '</div>' +
    (p.comment ? '<div class="m-composer"><input id="cmtNew" placeholder="Write a comment…"><button class="send" aria-label="Send" onclick="App.addCmt(\'' + h(id) + '\')">＋</button></div>' : '');
    $('#main').innerHTML = html;
    window._task = d;
  }
  function detailBtn(fn, id, label) { return '<button class="primary" onclick="App.stage(\'' + h(fn) + '\',\'' + h(id) + '\')">' + label + '</button>'; }

  function renderTaskModalDesktop(d) {
    S.modalTaskId = d.id;
    var p = d.perms;
    var stageActions = [];
    if (p.advance && d.stage === 'To Do') stageActions.push(btn('startTask', d.id, 'Start (→ In Progress)', 'btn'));
    if (p.advance && d.stage === 'In Progress') stageActions.push(btn('submitForReview', d.id, 'Submit for review', 'btn gold'));
    if (p.selfSubtask && d.stage !== 'Completed') stageActions.push(btn('approveTask', d.id, 'Mark complete', 'btn gold'));
    if (p.approve && d.stage === 'Review') {
      stageActions.push(btn('approveTask', d.id, 'Approve ✓', 'btn'));
      stageActions.push('<button class="btn danger" onclick="App.sendBack(\'' + h(d.id) + '\')">Send back</button>');
    }
    if (p.approve && d.stage === 'Completed') stageActions.push(btn('reopenTask', d.id, 'Reopen', 'btn ghost'));

    var assignOpts = (d.assignable || []).map(function (u) {
      return '<option value="' + h(u.email) + '"' + (u.email === d.assignee_email ? ' selected' : '') + '>' + h(u.name) + '</option>';
    }).join('');

    var html =
      '<div class="overlay" onclick="App.bgClose(event)"><div class="modal">' +
        '<div class="head">' +
          '<div class="grow"><div class="row wrap" style="gap:6px;margin-bottom:6px">' +
            '<span class="badge ' + stageClass(d.stage) + '">' + h(d.stage) + '</span>' +
            priBadge(d.priority) +
            (d.overdue ? '<span class="badge over">Overdue</span>' : '') +
            '<span class="small muted">' + h(d.project_name) + (d.parent_task_id ? ' · subtask' : '') + '</span></div>' +
            '<h2 id="tTitle">' + h(d.title) + '</h2></div>' +
          '<button class="x" onclick="App.closeModal()">×</button>' +
        '</div>' +
        '<div class="body">' +
          (stageActions.length ? '<div class="row wrap" style="margin-bottom:12px">' + stageActions.join('') + '</div>' : '') +
          '<div class="small muted">Assignee: <b>' + (d.assignee_name ? h(d.assignee_name) : 'Unassigned') + '</b> · Created by ' + h(d.creator_name) + ' · Due ' + (d.due_date ? fmtDate(d.due_date) : '—') + (d.est_hours === '' || d.est_hours == null ? '' : ' · Est ' + h(d.est_hours) + 'h') + '</div>' +
          '<p style="white-space:pre-wrap;margin-top:10px">' + h(d.description || '') + '</p>' +

          (p.editDefinition ? defEditor(d, assignOpts, p) : '') +

          /* checklist */
          '<div class="section"><h4>Checklist</h4><div id="chkList">' + checklistHtml(d.checklist, p.editExecution) + '</div>' +
            (p.editExecution ? '<div class="row" style="margin-top:8px"><input id="chkNew" placeholder="Add checklist item…"><button class="btn sm" onclick="App.addChk(\'' + h(d.id) + '\')">Add</button></div>' : '') +
          '</div>' +

          /* subtasks */
          '<div class="section"><h4>Subtasks</h4><div id="subList">' + subtasksHtml(d.subtasks) + '</div>' +
            (p.canCreateSubtask ? '<button class="btn ghost sm" style="margin-top:8px" onclick="App.newSubtask(\'' + h(d.id) + '\')">+ Add subtask</button>' : '') +
          '</div>' +

          /* attachments */
          '<div class="section"><h4>Attachments</h4><div id="attList">' + attHtml(d.attachments, S.boot.user) + '</div>' +
            (p.comment ? '<div class="row wrap" style="margin-top:8px">' +
              '<button class="btn ghost sm" onclick="App.pickFile(\'' + h(d.id) + '\')">⬆ Upload file</button>' +
              '<button class="btn ghost sm" onclick="App.linkFile(\'' + h(d.id) + '\')">🔗 Link Drive file</button>' +
              '<input type="file" id="fileInput" class="hidden"></div>' : '') +
          '</div>' +

          /* comments */
          '<div class="section"><h4>Comments</h4><div id="cmtList">' + commentsHtml(d.comments) + '</div>' +
            (p.comment ? '<div style="margin-top:8px"><textarea id="cmtNew" placeholder="Write a comment… use @name to notify"></textarea>' +
              '<div class="row" style="margin-top:6px"><span class="small muted grow">Tip: type @ then a teammate\'s name</span>' +
              '<button class="btn sm" onclick="App.addCmt(\'' + h(d.id) + '\')">Comment</button></div></div>' : '') +
          '</div>' +

          '<div class="section"><h4>History</h4>' + activityHtml(d.activity) + '</div>' +
          (p.editDefinition ? '<div class="section"><button class="btn danger sm" onclick="App.deleteTask(\'' + h(d.id) + '\')">Delete task</button></div>' : '') +
        '</div>' +
      '</div></div>';
    $('#modalHost').innerHTML = html;
    window._task = d;

  function defEditor(d, assignOpts, p) {

  /* ---------- change-detection sync ---------- */

  /* Fetch the latest ActivityLog token and store it as the known baseline.
     Call this after any user-triggered mutation so the next poll cycle won't
     fire a redundant refresh for a change the current user just made. */
  function syncReset() {
    call('getChangeToken').then(function (r) { _sync.token = r.token; }).catch(function () {});
  }

  /* Called every 30 s. Reads the token; if it differs from the last known
     value another user made a change, so we refresh the current view silently. */
  function syncTick() {
    if (_sync.flying) return;
    var ae = document.activeElement;
    // Skip when the user is actively typing to avoid interrupting input
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) return;
    _sync.flying = true;
    call('getChangeToken').then(function (r) {
      _sync.flying = false;
      if (_sync.token === null) { _sync.token = r.token; return; } // first call, just set baseline
      if (r.token !== _sync.token) {
        _sync.token = r.token;
        refreshCurrentList();
        refreshBell();
        // Refresh an open task modal so its content stays current
        if (S.modalTaskId && $('#modalHost').children.length) openTask(S.modalTaskId);
        toast('↺ Updated');
      }
    }).catch(function () { _sync.flying = false; });
  }

  function refreshCurrentList() {
    syncReset(); // keep token in sync so next poll won't double-refresh
    if (S.view === 'dashboard') App.applyFilters();
    if (S.view === 'mytasks') renderMyTasks();
    if (S.view === 'projects' && S.projectId) openProject(S.projectId);
  }

        '</select></label>' +
      '<label class="fld"><span>Mobile number</span>' +
        '<div class="row"><input id="ph_' + h(u.email) + '" value="' + h(u.phone||'') + '" placeholder="+91…">' +
        '<button class="btn ghost sm" onclick="App.savePhone(\'' + h(u.email) + '\')">Save</button></div></label>' +
      '<div class="row" style="margin-top:12px">' + (u.active
        ? '<button class="btn danger" style="flex:1" onclick="App.confirmDeactivate(\'' + h(u.email) + '\')">Deactivate</button>'
        : '<button class="btn ghost" style="flex:1" onclick="App.toggleActive(\'' + h(u.email) + '\',true)">Reactivate</button>') + '</div>' +
    '</div>';
  }

  // Roster: stacked cards on mobile, full table on desktop (same handlers/IDs).
  function teamRosterHtml(us) {
    if (isMobile()) {
      return '<div class="m-user-list" style="margin-bottom:24px">' + us.map(userMobileCard).join('') + '</div>';
    }
    return '<div class="card" style="overflow:auto;margin-bottom:24px">' +
      '<table class="tbl"><thead><tr><th>Name</th><th>Email</th><th>Level</th><th>Mobile number</th><th>Status</th><th></th></tr></thead><tbody>' +
      us.map(function (u) {
        return '<tr>' +
          '<td><b>' + h(u.name) + '</b></td>' +
          '<td class="small">' + h(u.email) + '</td>' +
          '<td><select onchange="App.setLevel(\'' + h(u.email) + '\',this.value)">' +
            ['L1','L2','L3','L4'].map(function (l) { return '<option value="'+l+'"'+(u.level===l?' selected':'')+'>'+l+'</option>'; }).join('') +
          '</select></td>' +
          '<td><div class="row" style="gap:4px">' +
            '<input id="ph_' + h(u.email) + '" value="' + h(u.phone||'') + '" placeholder="+91…" style="width:130px;font-size:12px">' +
            '<button class="btn ghost sm" onclick="App.savePhone(\'' + h(u.email) + '\')">Save</button>' +
          '</div></td>' +
          '<td>' + (u.active ? '<span class="badge stage-completed">Active</span>' : '<span class="badge stage-todo">Inactive</span>') +
            (u.on_leave ? ' <span class="badge over">On leave</span>' : '') + '</td>' +
          '<td><div class="row" style="gap:6px">' +
            '<button class="btn ghost sm" onclick="App.setLeave(\'' + h(u.email) + '\',' + (u.on_leave ? 'false' : 'true') + ')">' + (u.on_leave ? 'Back' : 'On leave') + '</button>' +
            (u.active
              ? '<button class="btn danger sm" onclick="App.confirmDeactivate(\'' + h(u.email) + '\')">Deactivate</button>'
              : '<button class="btn ghost sm" onclick="App.toggleActive(\'' + h(u.email) + '\',true)">Reactivate</button>') +
          '</div></td>' +
        '</tr>';
      }).join('') + '</tbody></table></div>';
  }

  /* Mobile Team & access — member cards + Add member (design 10). */
  function renderTeamMobile(us) {
    S._team = us;
    var add = '<button class="m-addmember" onclick="App.addMemberSheet()"><span style="font-size:22px;line-height:1">+</span> Add team member</button>';
    var cards = us.map(function (u) {
      return '<div class="m-card"><div class="m-member">' +
        '<div class="av">' + h(initials(u.name)) + '</div>' +
        '<div class="mid"><div class="nm">' + h(u.name) + '</div><div class="em">' + h(u.email) + '</div>' +
          '<div class="rowb"><span class="badge" style="background:var(--m-gold);color:#3a2a10">' + h(u.level) + '</span>' +
          (u.phone ? '<span class="ph">' + h(u.phone) + '</span>' : '') +
          (u.active ? '<span class="badge" style="background:#e6f3e9;color:#2f7a40">Active</span>' : '<span class="badge stage-todo">Inactive</span>') +
          (u.on_leave ? '<span class="badge" style="background:#fdeceb;color:#b3261e">On leave</span>' : '') +
          '</div></div>' +
        '<button aria-label="Member menu" style="border:none;background:none;color:var(--muted);font-size:22px;padding:0 4px;align-self:flex-start" onclick="App.memberMenu(\'' + h(u.email) + '\')">⋮</button>' +
      '</div></div>';
    }).join('');
    $('#main').innerHTML = add + '<div class="m-list">' + cards + '</div>';
  }

  function renderAdmin() {
    var main = $('#main'); main.innerHTML = '<div class="spinner"></div>';
    if (isMobile()) {
      S.view = 'admin';
      mAppbar({ title: 'Team & access', navKey: 'more' });
      call('listUsersAdmin').then(function (us) { renderTeamMobile(us); }).catch(errToast);
      return;
    }
    Promise.all([call('listUsersAdmin'), call('getWhatsAppConfig'), call('getEmailConfig')]).then(function (res) {
      var us  = res[0];
      var wac = res[1];
      var emc = res[2];
      main.innerHTML =
        '<div class="page-head"><h1>Team &amp; access</h1></div>' +

        /* Add member form */
        '<div class="card" style="padding:16px;margin-bottom:18px"><h4 style="margin-bottom:8px">Add team member</h4>' +
          '<div class="filters" style="margin:0;flex-wrap:wrap">' +
            '<input id="uEmail" placeholder="email@gmail.com">' +
            '<input id="uName" placeholder="Full name">' +
            '<select id="uLevel"><option value="L3">L3 · Team Member</option><option value="L2">L2 · Project Lead</option><option value="L1">L1 · Director</option><option value="L4">L4 · Junior Member</option></select>' +
            '<input id="uPhone" placeholder="+91XXXXXXXXXX (optional)">' +
            '<button class="btn gold" onclick="App.addUser()">Add / update</button>' +
          '</div>' +
          '<p class="small muted" style="margin-top:8px">Only emails listed here (and active) can sign in. Mobile number must be in international format (+91…).</p>' +
        '</div>' +

        /* Team roster — cards on mobile, table on desktop */
        teamRosterHtml(us) +

        /* Email notification settings */
        '<div class="card" style="padding:18px;margin-bottom:18px">' +
          '<div class="row" style="align-items:center;margin-bottom:10px">' +
            '<h3 style="margin:0">Email notifications</h3>' +
            '<span class="spacer"></span>' +
            '<label style="display:flex;align-items:center;gap:8px;cursor:pointer">' +
              '<input type="checkbox" id="emEnabled"' + (emc.enabled ? ' checked' : '') + ' onchange="App.toggleEm(this.checked)">' +
              '<span class="small"><b>' + (emc.enabled ? 'Enabled' : 'Disabled') + '</b></span>' +
            '</label>' +
          '</div>' +
          '<p class="small muted" style="margin:0">When disabled, no emails are sent for task assignments, stage changes, comments, or daily digests. In-app notifications continue to work normally.</p>' +
        '</div>' +

        /* WhatsApp settings */
        '<div class="card" style="padding:18px;margin-bottom:18px">' +
          '<div class="row" style="margin-bottom:14px;align-items:center">' +
            '<h3 style="margin:0">WhatsApp notifications</h3>' +
            '<span class="spacer"></span>' +
            '<label style="display:flex;align-items:center;gap:8px;cursor:pointer">' +
              '<input type="checkbox" id="waEnabled"' + (wac.enabled ? ' checked' : '') + ' onchange="App.toggleWa(this.checked)">' +
              '<span class="small"><b>' + (wac.enabled ? 'Enabled' : 'Disabled') + '</b></span>' +
            '</label>' +
          '</div>' +
          '<div class="row wrap" style="gap:10px;margin-bottom:10px">' +
            '<label class="fld" style="min-width:160px"><span>Provider</span>' +
              '<select id="waProvider">' +
                ['twilio','wati','meta'].map(function(p){return '<option'+(wac.provider===p?' selected':'')+'>'+p+'</option>';}).join('') +
              '</select></label>' +
            '<label class="fld grow"><span>API key / token ' + (wac.hasApiKey ? '(saved — paste to replace)' : '(not set)') + '</span>' +
              '<input id="waApiKey" type="password" placeholder="Leave blank to keep existing"></label>' +
            '<label class="fld" style="min-width:220px"><span>API URL (WATI / Meta only)</span>' +
              '<input id="waApiUrl" value="' + h(wac.apiUrl) + '" placeholder="https://…"></label>' +
            '<label class="fld" style="min-width:180px"><span>Sender / From number</span>' +
              '<input id="waFrom" value="' + h(wac.from) + '" placeholder="whatsapp:+14155238886"></label>' +
          '</div>' +
          '<div class="row" style="gap:8px;margin-top:4px">' +
            '<button class="btn gold" onclick="App.saveWaConfig()">Save config</button>' +
            '<button class="btn ghost" onclick="App.testWa()">Send test message</button>' +
            '<button class="btn ghost" onclick="App.loadWaLogs()">View message log</button>' +
          '</div>' +
          '<div id="waLog" style="margin-top:14px"></div>' +
        '</div>';
    }).catch(errToast);
  }

  /* ---------- notifications ---------- */
  function refreshBell() {
    call('unreadCount').then(function (n) {
      [].forEach.call(document.querySelectorAll('.bellCount'), function (b) {
        b.textContent = n; b.classList.toggle('hidden', !n);
      });
    }).catch(function () {});
  }
  function loadNotifs() {
    call('listMyNotifications', 30).then(function (list) {
      $('#notifPop').innerHTML = '<div class="card notif-pop">' +
        '<div class="row" style="padding:10px 14px;border-bottom:1px solid var(--line)"><b class="grow">Notifications</b>' +
          '<button class="btn ghost sm" onclick="App.markAll()">Mark all read</button></div>' +
        (list.length ? list.map(function (n) {
          return '<div class="notif' + (n.read ? '' : ' unread') + '" onclick="App.openFromNotif(\'' + h(n.id) + '\',\'' + h(n.task_id||'') + '\')">' +
            '<div class="nt">' + h(n.title) + '</div><div class="nb">' + h(n.body) + '</div>' +
            '<div class="small muted">' + fmtWhen(n.created_at) + '</div></div>';
        }).join('') : '<div style="padding:18px" class="muted small center">No notifications.</div>') + '</div>';
    }).catch(errToast);
  }
  document.addEventListener('click', function (e) {
    if (S.notifOpen && !e.target.closest('#notifPop') && !e.target.closest('.bell')) { S.notifOpen = false; $('#notifPop').innerHTML = ''; }
  });

  /* poll the bell every 90s */
  setInterval(refreshBell, 90000);

  init();
})();
</script>
